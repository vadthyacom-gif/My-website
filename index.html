<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODNEX.DEV</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0f1c;
  --card:#121a2b;
  --text:#fff;
  --accent:#00c3ff;
}

.light{
  --bg:#f5f7ff;
  --card:#fff;
  --text:#000;
  --accent:#0077ff;
}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  font-family:'Inter', Arial;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* ===== BACKGROUND ANIMATION ===== */
body::before{
  content:"";
  position:fixed;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background: radial-gradient(circle at 30% 30%, rgba(0,195,255,0.25), transparent 40%),
              radial-gradient(circle at 70% 60%, rgba(255,0,200,0.12), transparent 40%),
              radial-gradient(circle at 50% 50%, rgba(0,255,150,0.10), transparent 50%);
  animation: floatBG 14s linear infinite;
  z-index:-1;
  filter: blur(45px);
}

@keyframes floatBG{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:var(--card);
  position:sticky;
  top:0;
  z-index:1000;
  backdrop-filter: blur(10px);
}

/* SIDEBAR */
#sidebar {
  position: fixed;
  left: -260px;
  top: 0;
  width: 250px;
  height: 100%;
  background: rgba(20,20,40,0.85);
  backdrop-filter: blur(15px);
  padding-top: 60px;
  transition: 0.4s;
  z-index: 2000;
}

#sidebar.open{
  left:0;
  box-shadow:20px 0 60px rgba(0,0,0,0.6);
}

#sidebar a{
  display:block;
  padding:15px;
  color:var(--text);
  text-decoration:none;
  transition:0.3s;
}

#sidebar a:hover{
  background:var(--accent);
  transform:translateX(5px);
}

/* SECTIONS */
section{
  padding:60px 20px;
  text-align:center;
}

/* HERO */
.hero img{
  width:140px;
  height:140px;
  object-fit:cover;
  border-radius:50%;
  border:3px solid var(--accent);
  animation: glowPulse 3s infinite;
}

@keyframes glowPulse{
  0%{box-shadow:0 0 0 rgba(0,195,255,0);}
  50%{box-shadow:0 0 35px rgba(0,195,255,0.5);}
  100%{box-shadow:0 0 0 rgba(0,195,255,0);}
}

/* BUTTONS */
button{
  padding:10px 15px;
  background:var(--accent);
  border:none;
  cursor:pointer;
  margin:5px;
  border-radius:10px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.08);
  box-shadow:0 0 20px rgba(0,195,255,0.5);
}

/* ADMIN */
#adminPanel, #loginBox{
  display:none;
  padding:20px;
  text-align:center;
}

/* CONTACT PANEL */
#contactBox{
  position:fixed;
  left:0;
  right:0;
  bottom:-100%;
  height:40%;
  background:rgba(20,20,40,0.9);
  backdrop-filter: blur(20px);
  z-index:3000;
  transition:0.4s ease-in-out;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
}

#contactBox.open{
  bottom:0;
}

.contact-icons{
  display:flex;
  gap:20px;
  justify-content:center;
}

.icon-btn{
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg);
  font-size:24px;
  text-decoration:none;
  transition:0.3s;
  animation:floatIcon 3s infinite ease-in-out;
}

.icon-btn:hover{
  transform:scale(1.2);
  box-shadow:0 0 20px var(--accent);
}

@keyframes floatIcon{
  0%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
  100%{transform:translateY(0);}
}

/* ===== SCROLL ANIMATION ===== */
section, .card{
  opacity:0;
  transform:translateY(30px);
  transition:0.8s ease;
}
</style>
</head>

<body>

<header>
  <span onclick="toggleSidebar()" style="font-size:24px;cursor:pointer;">☰</span>
  <h2>CODNEX.DEV 🚀</h2>
  <button onclick="toggleTheme()">🌙</button>
</header>

<!-- SIDEBAR -->
<div id="sidebar">
  <a href="#home" onclick="closeSidebar(event)">Home</a>
  <a href="#about" onclick="closeSidebar(event)">About</a>
  <a href="#projects" onclick="closeSidebar(event)">Projects</a>
  <a href="#" onclick="openContact(event)">Contact</a>
  <a href="#" onclick="openAdmin(event)">Admin</a>
</div>

<!-- HERO -->
<section id="home">
  <h1>Hello, I'm SASIKANTH 👋</h1>
  <p>Frontend Developer</p>
  <img src="profile.jpg">
</section>

<!-- ABOUT -->
<section id="about">
  <h2>About Me</h2>
  <p>I am learning web development and building real projects.</p>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2>Projects</h2>

  <button onclick="openApp('calculator.html')">Calculator</button>
  <button onclick="openApp('currency.html')">Currency Converter</button>
  <button onclick="openApp('resume.html')">Resume Builder</button>
</section>

<!-- CONTACT -->
<div id="contactBox">
  <div class="contact-icons">
    <a class="icon-btn" href="https://wa.me/918309696024">📱</a>
    <a class="icon-btn" href="mailto:vadthya.com@gmail.com">✉️</a>
    <a class="icon-btn" href="https://instagram.com">📸</a>
  </div>
</div>

<!-- ADMIN -->
<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="pass">
  <button onclick="login()">Login</button>
</div>

<div id="adminPanel">
  <h2>Admin Panel</h2>
</div>

<script>

const ADMIN_PASSWORD="shashi830";

/* BASIC */
function toggleTheme(){
  document.body.classList.toggle("light");
}

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
}

function closeSidebar(e){
  if(e) e.preventDefault();
  document.getElementById("sidebar").classList.remove("open");
}

/* NAV */
function openApp(p){
  window.location.href=p;
}

/* CONTACT */
function openContact(e){
  if(e) e.preventDefault();
  document.getElementById("contactBox").classList.add("open");
}

function closeContact(){
  document.getElementById("contactBox").classList.remove("open");
}

/* ADMIN */
function openAdmin(e){
  if(e) e.preventDefault();
  document.getElementById("loginBox").style.display="block";
}

function login(){
  if(document.getElementById("pass").value===ADMIN_PASSWORD){
    document.getElementById("adminPanel").style.display="block";
    document.getElementById("loginBox").style.display="none";
  }
}

/* ===== SCROLL ANIMATION ENGINE ===== */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.style.opacity=1;
      e.target.style.transform="translateY(0)";
    }
  });
});

document.querySelectorAll("section, .card")
.forEach(el=>observer.observe(el));

</script>

</body>
</html>
