<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(to right, #74ebd5, #9face6);
      text-align: center;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
      position: sticky;
      top: 0;
    }

    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: yellow;
    }

    section {
      padding: 20px;
    }

    .card {
      max-width: 400px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button {
      padding: 10px 20px;
      background: blue;
      color: white;
      border: none;
      border-radius: 5px;
    }

    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>My Portfolio</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HOME -->
<section id="home">
  <div class="card">
    <h2>Welcome 👋</h2>

    <img src="profile.jpg" width="150"
         style="border-radius:50%; display:block; margin:20px auto;">

    <p>Hello! I am learning web development.</p>

    <button onclick="sayHello()">Click Me</button>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="card">
    <h2>About Me</h2>

    <p>My name is [Your Name]</p>
    <p>I am a student from India.</p>
    <p>I am learning HTML, CSS, and JavaScript.</p>
  </div>
</section>

<!-- SKILLS -->
<section id="skills">
  <div class="card">
    <h2>My Skills</h2>

    <p>✔ HTML</p>
    <p>✔ CSS</p>
    <p>✔ JavaScript (Basic)</p>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <div class="card">
    <h2>Contact Me</h2>

    <input type="text" placeholder="Your Name"><br>
    <input type="email" placeholder="Your Email"><br>
    <textarea placeholder="Your Message"></textarea><br>

    <button onclick="sendMessage()" style="background: green;">
      Send
    </button>
  </div>
</section>

<script>
  function sayHello() {
    alert("Welcome to my portfolio!");
  }

  function sendMessage() {
    alert("Message sent successfully!");
  }
</script>

</body>
</html>
