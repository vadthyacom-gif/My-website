<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODNEX.DEV</title>

<style>
:root{
  --bg:#0a0f1c;
  --card:#121a2b;
  --text:#fff;
  --accent:#00c3ff;
}

.light{
  --bg:#f5f7ff;
  --card:#fff;
  --text:#000;
  --accent:#0077ff;
}

html{ scroll-behavior:smooth; }

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px;
  background:var(--card);
  position:sticky;
  top:0;
  z-index:1000;
}

/* SIDEBAR */
#sidebar {
  position: fixed;
  left: -260px;
  top: 0;
  width: 250px;
  height: 100%;
  background: var(--card);
  padding-top: 60px;
  transition: 0.3s;
  z-index: 2000;
}

#sidebar a{
  display:block;
  padding:15px;
  color:var(--text);
  text-decoration:none;
}

#sidebar a:hover{
  background:var(--accent);
  color:#fff;
}

#sidebar.open{ left:0; }

#menuBtn{ font-size:24px; cursor:pointer; }

/* SECTIONS */
section{
  padding:60px 20px;
  text-align:center;
}

/* HERO */
.hero img{
  width:140px;
  height:140px;
  object-fit:cover;
  border-radius:50%;
  border:3px solid var(--accent);
}

/* BUTTONS */
button{
  padding:10px 15px;
  background:var(--accent);
  border:none;
  cursor:pointer;
  margin:5px;
  border-radius:10px;
}

/* PROJECTS */
.projects{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  width:250px;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{ transform:scale(1.05); }

/* ADMIN */
#adminPanel, #loginBox{
  display:none;
  padding:20px;
  text-align:center;
}

/* ===================== */
/* OVERLAY BLUR SYSTEM */
/* ===================== */

#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
  backdrop-filter: blur(10px);
  opacity:0;
  pointer-events:none;
  transition:0.3s;
  z-index:2500;
}

#overlay.active{
  opacity:1;
  pointer-events:auto;
}

/* CONTACT PANEL */
#contactBox{
  position:fixed;
  left:0;
  right:0;
  bottom:-100%;
  height:40%;
  background:var(--card);
  z-index:3000;
  transition:0.4s ease;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
}

#contactBox.open{
  bottom:0;
}

/* ICONS */
.contact-icons{
  display:flex;
  gap:20px;
  justify-content:center;
  margin-top:10px;
}

.icon-btn{
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg);
  font-size:24px;
  text-decoration:none;
  transition:0.3s;
}

.icon-btn:hover{
  transform:scale(1.2);
  box-shadow:0 0 15px var(--accent);
}

/* ADMIN ANIMATION */
#loginBox{
  transform:scale(0.8);
  opacity:0;
  transition:0.3s;
}

#loginBox.show{
  transform:scale(1);
  opacity:1;
}

</style>
</head>

<body>

<div id="overlay" onclick="closeAll()"></div>

<!-- SIDEBAR -->
<div id="sidebar">
  <a href="#home" onclick="closeSidebar(event)">Home</a>
  <a href="#about" onclick="closeSidebar(event)">About</a>
  <a href="#projects" onclick="closeSidebar(event)">Projects</a>
  <a href="#" onclick="openContact(event)">Contact</a>
  <a href="#" onclick="openAdmin(event)">Admin</a>
</div>

<header>
  <span id="menuBtn" onclick="toggleSidebar()">☰</span>
  <h2>CODNEX.DEV 🚀</h2>
  <button onclick="toggleTheme()">🌙</button>
</header>

<!-- HERO -->
<section id="home">
  <h1>Hello, I'm SASIKANTH 👋</h1>
  <p>Frontend Developer</p>
  <img src="profile.jpg">
</section>

<!-- ABOUT -->
<section id="about">
  <h2>About Me</h2>
  <p>I am learning web development and building real projects.</p>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2>Projects</h2>

  <div class="projects">

    <div class="card" onclick="openApp('calculator.html')">
      <img src="project1.jpg" width="100%">
      <h3>Calculator</h3>
    </div>

    <div class="card" onclick="openApp('currency.html')">
      <img src="project2.jpg" width="100%">
      <h3>Currency Converter</h3>
    </div>

    <div class="card" onclick="openApp('resume.html')">
      <img src="project3.jpg" width="100%">
      <h3>Resume Builder</h3>
    </div>

  </div>
</section>

<!-- CONTACT -->
<div id="contactBox">
  <div class="contact-content">
    <h3>Contact Options</h3>

    <div class="contact-icons">
      <a class="icon-btn" href="https://wa.me/918309696024">📱</a>
      <a class="icon-btn" href="mailto:vadthya.com@gmail.com">✉️</a>
      <a class="icon-btn" href="https://instagram.com">📸</a>
    </div>

    <button onclick="closeContact()">Close</button>
  </div>
</div>

<!-- ADMIN -->
<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="pass">
  <button onclick="login()">Login</button>
</div>

<div id="adminPanel">
  <h2>Admin Panel</h2>
  <button onclick="loadMessages()">Refresh</button>
</div>

<script>

const ADMIN_PASSWORD="shashi830";

/* BASIC */
function toggleTheme(){
  document.body.classList.toggle("light");
}

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
}

function closeSidebar(e){
  if(e) e.preventDefault();
  document.getElementById("sidebar").classList.remove("open");
}

function openApp(p){
  window.location.href=p;
}

/* CONTACT */
function openContact(e){
  if(e) e.preventDefault();
  document.getElementById("contactBox").classList.add("open");
  document.getElementById("overlay").classList.add("active");
}

function closeContact(){
  document.getElementById("contactBox").classList.remove("open");
  document.getElementById("overlay").classList.remove("active");
}

/* ADMIN */
function openAdmin(e){
  if(e) e.preventDefault();
  document.getElementById("loginBox").classList.add("show");
  document.getElementById("overlay").classList.add("active");
}

function login(){
  const p=document.getElementById("pass").value;

  if(p===ADMIN_PASSWORD){
    document.getElementById("adminPanel").style.display="block";
    document.getElementById("loginBox").classList.remove("show");
  } else alert("Wrong password");
}

/* CLOSE ALL */
function closeAll(){
  closeContact();
  document.getElementById("loginBox").classList.remove("show");
  document.getElementById("overlay").classList.remove("active");
}

function loadMessages(){
  alert("Demo mode");
}

</script>

</body>
</html>
