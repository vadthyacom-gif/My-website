<!DOCTYPE html>
<html>
<head>
  <title>CODNEX.DEV</title>

  <style>
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial;
      background: #0b1220;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      background: rgba(17, 24, 39, 0.9);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a {
      color: white;
      margin-left: 15px;
      text-decoration: none;
    }

    nav a:hover {
      color: #38bdf8;
    }

    section {
      padding: 60px 20px;
      text-align: center;
    }

    .hero {
      padding: 120px 20px;
      background: radial-gradient(circle, #1e293b, #0b1220);
    }

    .hero img {
      width: 140px;
      border-radius: 50%;
      border: 3px solid #38bdf8;
      margin-top: 20px;
    }

    .skills div {
      display: inline-block;
      background: #1e293b;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 20px;
    }

    .projects {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .project-card {
      width: 250px;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #334155;
    }

    .project-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    input, textarea {
      width: 80%;
      padding: 12px;
      margin: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: #38bdf8;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    footer {
      background: #111827;
      text-align: center;
      padding: 15px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<header>
  <h2>CODNEX.DEV 🚀</h2>
  <nav>
    <a href="#home">Home</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <h1>Hello, I'm VADTHYA SASIKANTH 👋</h1>
  <p>Frontend Developer</p>
  <img src="profile.jpg">
</section>

<!-- SKILLS -->
<section id="skills">
  <h2>Skills</h2>
  <div class="skills">
    <div>HTML</div>
    <div>CSS</div>
    <div>JavaScript</div>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2>Projects</h2>

  <div class="projects">

    <div class="project-card">
      <img src="project1.jpg">
      <h3>Calculator</h3>
    </div>

    <div class="project-card">
      <img src="project2.jpg">
      <h3>Currency Converter</h3>
    </div>

    <div class="project-card">
      <img src="project3.jpg">
      <h3>Resume Builder</h3>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact Me</h2>

  <form id="contactForm">
    <input type="text" id="name" placeholder="Your Name" required><br>
    <input type="email" id="email" placeholder="Your Email" required><br>
    <textarea id="message" placeholder="Your Message" required></textarea><br>

    <button type="submit">Send</button>
  </form>

  <p id="status"></p>

  <br>

  <!-- RESTORED CONTACT OPTIONS -->
  <a href="https://wa.me/918309696024" target="_blank">
    <button>WhatsApp</button>
  </a>

  <a href="mailto:vadthya.com@gmail.com">
    <button>Email</button>
  </a>

</section>

<footer>
  © 2026 CODNEX.DEV
</footer>

<script>
  const scriptURL = "YOUR_GOOGLE_SCRIPT_URL_HERE";

  document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();

    fetch(scriptURL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: name.value,
        email: email.value,
        message: message.value
      })
    })
    .then(res => res.text())
    .then(() => {
      status.innerText = "Message sent!";
      contactForm.reset();
    })
    .catch(() => {
      status.innerText = "Error sending message";
    });
  });
</script>

</body>
</html>
