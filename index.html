<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODNEX.DEV</title>

<style>
:root{
  --bg:#0a0f1c;
  --card:#121a2b;
  --text:#fff;
  --accent:#00c3ff;
}

.light{
  --bg:#f5f7ff;
  --card:#fff;
  --text:#000;
  --accent:#0077ff;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px;
  background:var(--card);
  position:sticky;
  top:0;
  z-index:1000;
}

/* SIDEBAR */
#sidebar {
  position: fixed;
  left: -260px;
  top: 0;
  width: 250px;
  height: 100%;
  background: var(--card);
  padding-top: 60px;
  transition: 0.3s;
  z-index: 2000;
}

#sidebar a {
  display:block;
  padding:15px;
  color:var(--text);
  text-decoration:none;
}

#sidebar a:hover{
  background:var(--accent);
  color:#fff;
}

#sidebar.open{
  left:0;
}

#menuBtn{
  font-size:24px;
  cursor:pointer;
}

/* SECTIONS */
section{
  padding:60px 20px;
  text-align:center;
}

/* HERO */
.hero img{
  width:140px;
  border-radius:50%;
  border:3px solid var(--accent);
}

/* PROJECTS */
.projects{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  width:250px;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.05);
}

/* BUTTONS */
button{
  padding:10px 15px;
  background:var(--accent);
  border:none;
  cursor:pointer;
  margin:5px;
}

/* ADMIN */
#adminPanel, #loginBox{
  display:none;
  padding:20px;
  text-align:center;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <a href="#home" onclick="closeSidebar()">Home</a>
  <a href="#about" onclick="closeSidebar()">About</a>
  <a href="#projects" onclick="closeSidebar()">Projects</a>
  <a href="#contact" onclick="closeSidebar()">Contact</a>
</div>

<header>
  <span id="menuBtn" onclick="toggleSidebar()">☰</span>
  <h2>CODNEX.DEV 🚀</h2>
  <button onclick="toggleTheme()">🌙</button>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <h1>Hello, I'm SASIKANTH 👋</h1>
  <p>Frontend Developer</p>
  <img src="profile.jpg">
</section>

<!-- ABOUT -->
<section id="about">
  <h2>About Me</h2>
  <p>I am learning web development and building real projects.</p>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2>Projects</h2>

  <div class="projects">

    <div class="card" onclick="openApp('calculator.html')">
      <h3>Calculator</h3>
    </div>

    <div class="card" onclick="openApp('currency.html')">
      <h3>Currency Converter</h3>
    </div>

    <div class="card" onclick="openApp('resume.html')">
      <h3>Resume Builder</h3>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact Me</h2>

  <form id="contactForm">
    <input id="name" placeholder="Name" required><br><br>
    <input id="email" placeholder="Email" required><br><br>
    <textarea id="message" placeholder="Message" required></textarea><br><br>
    <button type="submit">Send</button>
  </form>

  <p id="status"></p>
</section>

<!-- ADMIN LOGIN -->
<div id="loginBox">
  <h2>Admin Login 🔐</h2>
  <input id="pass" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h2>Admin Dashboard 📊</h2>
  <button onclick="loadMessages()">Refresh</button>
  <div id="msgBox"></div>
</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzL1233_V5nP0dTXKLtA66K8FLxFbDMF6C-plg_STVKR_GYP9OdYXZlg9XaTkMNzyhAFg/exec";
const ADMIN_PASSWORD = "shashi830";

/* CONTACT FORM */
const form = document.getElementById("contactForm");
const status = document.getElementById("status");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    message: document.getElementById("message").value
  };

  try {
    await fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    status.innerText = "Message sent successfully!";
    form.reset();

  } catch (err) {
    status.innerText = "Failed to send message";
  }
});

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
}

function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
}

/* OPEN APPS (YOUR HTML FILES) */
function openApp(page){
  window.location.href = page;
}

/* ADMIN */
function login(){
  const p = document.getElementById("pass").value;

  if(p === ADMIN_PASSWORD){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadMessages();
  } else {
    alert("Wrong password");
  }
}

/* LOAD MESSAGES */
function loadMessages(){
  fetch(scriptURL + "?action=read")
  .then(res => res.json())
  .then(data => {

    const box = document.getElementById("msgBox");
    box.innerHTML = "";

    if(!Array.isArray(data)){
      box.innerHTML = "No messages found";
      return;
    }

    data.reverse().forEach(m => {
      box.innerHTML += `
        <div class="card">
          <b>${m.name}</b><br>
          ${m.email}<br>
          ${m.message}
        </div>
      `;
    });

  })
  .catch(() => {
    document.getElementById("msgBox").innerText = "Error loading messages";
  });
}

</script>

</body>
</html>
