<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODNEX APP STORE</title>

<style>
:root{
  --bg:#0b0f1a;
  --card:#141b2d;
  --text:#ffffff;
  --muted:#aab3c5;
  --accent:#00c3ff;
}

.light{
  --bg:#f5f7ff;
  --card:#ffffff;
  --text:#111;
  --muted:#555;
  --accent:#0077ff;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* TOP BAR */
header{
  position:sticky;
  top:0;
  z-index:1000;
  background:var(--card);
  padding:12px 15px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

#menuBtn{
  font-size:22px;
  cursor:pointer;
}

.search{
  flex:1;
  margin:0 10px;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
}

/* SIDEBAR */
#sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:250px;
  height:100%;
  background:var(--card);
  padding-top:60px;
  transition:0.3s;
  z-index:2000;
}

#sidebar.open{ left:0; }

#sidebar a{
  display:block;
  padding:15px;
  color:var(--text);
  text-decoration:none;
}

#sidebar a:hover{
  background:var(--accent);
  color:#fff;
}

/* APP GRID */
.container{
  padding:20px;
}

.section-title{
  font-size:18px;
  margin:10px 0;
  color:var(--muted);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
}

/* APP CARD */
.app{
  background:var(--card);
  border-radius:16px;
  padding:15px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.app:hover{
  transform:scale(1.05);
}

.icon{
  width:60px;
  height:60px;
  border-radius:15px;
  background:var(--accent);
  margin:0 auto 10px;
}

.app h3{
  margin:5px 0;
  font-size:14px;
}

.app p{
  font-size:12px;
  color:var(--muted);
  margin:0;
}

button{
  margin-top:8px;
  padding:6px 12px;
  border:none;
  background:var(--accent);
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

/* HERO BANNER */
.banner{
  background:linear-gradient(135deg,var(--accent),#7b2cff);
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
  color:#fff;
}

/* ADMIN */
#adminPanel,#loginBox{
  display:none;
  padding:20px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <a href="#">Home</a>
  <a href="#apps">Apps</a>
  <a href="#" onclick="openAdmin()">Admin</a>
</div>

<!-- HEADER -->
<header>
  <span id="menuBtn" onclick="toggleSidebar()">☰</span>

  <div class="search">
    <input placeholder="Search apps...">
  </div>

  <button onclick="toggleTheme()">🌙</button>
</header>

<!-- CONTENT -->
<div class="container">

  <div class="banner">
    <h2>CODNEX App Store 🚀</h2>
    <p>All your apps in one place</p>
  </div>

  <div class="section-title">Featured Apps</div>

  <div class="grid">

    <div class="app" onclick="openApp('calculator.html')">
      <div class="icon"></div>
      <h3>Calculator</h3>
      <p>Basic arithmetic tool</p>
      <button>Open</button>
    </div>

    <div class="app" onclick="openApp('currency.html')">
      <div class="icon"></div>
      <h3>Currency</h3>
      <p>Live converter</p>
      <button>Open</button>
    </div>

    <div class="app" onclick="openApp('resume.html')">
      <div class="icon"></div>
      <h3>Resume Builder</h3>
      <p>Create CV easily</p>
      <button>Open</button>
    </div>

  </div>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="pass" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div id="adminPanel">
  <h2>Admin Panel</h2>
  <div id="msgBox"></div>
</div>

<script>

const ADMIN_PASSWORD = "shashi830";

/* OPEN APP */
function openApp(page){
  window.location.href = page;
}

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
}

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* ADMIN */
function openAdmin(){
  document.getElementById("loginBox").style.display="block";
}

function login(){
  const p = document.getElementById("pass").value;

  if(p === ADMIN_PASSWORD){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("adminPanel").style.display="block";
  }else{
    alert("Wrong password");
  }
}

</script>

</body>
</html>
