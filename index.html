<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODNEX.DEV</title>

<style>
:root {
  --bg:#0a0f1c;
  --card:#121a2b;
  --text:white;
  --accent:#00c3ff;
}

.light {
  --bg:#f5f7ff;
  --card:white;
  --text:black;
  --accent:#0077ff;
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:var(--card);
  position:sticky;
  top:0;
}

nav a {
  margin:0 10px;
  text-decoration:none;
  color:var(--text);
}

section {
  padding:50px 20px;
  text-align:center;
}

.card {
  background:var(--card);
  padding:15px;
  margin:10px;
  border-radius:10px;
}

.projects {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

button {
  padding:8px 12px;
  background:var(--accent);
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h2>CODNEX.DEV</h2>

  <nav>
    <a href="#home">Home</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
    <a href="#admin" onclick="openAdmin()">Admin</a>
  </nav>

  <button onclick="toggleTheme()">🌙</button>
</header>

<!-- HOME -->
<section id="home">
  <h1>Portfolio Website 🚀</h1>
  <p>Advanced Developer System</p>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2>Projects</h2>

  <div class="projects">
    <div class="card">Calculator</div>
    <div class="card">Currency Converter</div>
    <div class="card">Resume Builder</div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>

  <form id="contactForm">
    <input id="name" type="text" placeholder="Name"><br>
    <input id="email" type="email" placeholder="Email"><br>
    <textarea id="message" placeholder="Message"></textarea><br>
    <button type="submit">Send</button>
  </form>

  <p id="status"></p>
</section>

<!-- ADMIN LOGIN -->
<section id="admin">
  <div id="loginBox">
    <h2>Admin Login 🔐</h2>
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <div id="adminPanel" style="display:none;">
    <h2>Dashboard 📊</h2>
    <button onclick="loadMessages()">Refresh</button>
    <div id="messages"></div>
  </div>
</section>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzL1233_V5nP0dTXKLtA66K8FLxFbDMF6C-plg_STVKR_GYP9OdYXZlg9XaTkMNzyhAFg/exec";
const ADMIN_PASSWORD = "shashi830";

/* FIXED CONTACT FORM */
document.getElementById("contactForm").addEventListener("submit", e=>{
  e.preventDefault();

  fetch(scriptURL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:document.getElementById("name").value,
      email:document.getElementById("email").value,
      message:document.getElementById("message").value
    })
  })
  .then(r=>r.text())
  .then(()=>{
    document.getElementById("status").innerText="Message sent!";
    document.getElementById("contactForm").reset();
  })
  .catch(()=>{
    document.getElementById("status").innerText="Error sending message!";
  });
});

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* ADMIN */
function openAdmin(){
  document.getElementById("loginBox").style.display="block";
}

function login(){
  let p=document.getElementById("pass").value;

  if(p===ADMIN_PASSWORD){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("adminPanel").style.display="block";
    loadMessages();
  }else{
    alert("Wrong password");
  }
}

/* LOAD MESSAGES */
function loadMessages(){
  fetch(scriptURL+"?action=read")
  .then(r=>r.json())
  .then(data=>{
    let html="";
    data.reverse().forEach(m=>{
      html+=`
        <div class="card">
          <b>${m.name}</b><br>
          ${m.email}<br>
          ${m.message}<br>
          <small>${m.date}</small>
        </div>
      `;
    });

    document.getElementById("messages").innerHTML=html;
  });
}
</script>

</body>
</html>
