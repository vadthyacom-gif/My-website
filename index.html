<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CODNEX.DEV | Dashboard</title>

<style>
:root{
  --bg:#0b1220;
  --card:#121a2b;
  --text:#fff;
  --accent:#00c3ff;
}

.light{
  --bg:#f5f7ff;
  --card:#fff;
  --text:#000;
  --accent:#0077ff;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  position:fixed;
  left:0;
  top:0;
  background:var(--card);
  padding:20px;
}

.sidebar h2{
  margin-bottom:20px;
}

.sidebar a{
  display:block;
  padding:10px;
  color:var(--text);
  text-decoration:none;
  margin:5px 0;
  border-radius:6px;
}

.sidebar a:hover{
  background:var(--accent);
  color:black;
}

/* MAIN */
.main{
  margin-left:240px;
  padding:20px;
}

/* CARDS */
.card{
  background:var(--card);
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

/* LOGIN */
#loginBox{
  text-align:center;
  margin-top:150px;
}

input{
  padding:10px;
  margin:5px;
  width:200px;
}

button{
  padding:10px 15px;
  background:var(--accent);
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Admin Login 🔐</h2>
  <input id="pass" type="password" placeholder="Password">
  <br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

  <div class="sidebar">
    <h2>CODNEX</h2>
    <a href="#" onclick="showSection('home')">🏠 Home</a>
    <a href="#" onclick="showSection('messages')">📩 Messages</a>
    <a href="#" onclick="toggleTheme()">🌙 Theme</a>
  </div>

  <div class="main">

    <div id="home">
      <h1>Dashboard 🚀</h1>
      <p>Welcome Admin</p>
    </div>

    <div id="messages" style="display:none;">
      <h2>Messages</h2>
      <button onclick="loadMessages()">Refresh</button>
      <div id="msgBox"></div>
    </div>

  </div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzL1233_V5nP0dTXKLtA66K8FLxFbDMF6C-plg_STVKR_GYP9OdYXZlg9XaTkMNzyhAFg/exec";
const ADMIN_PASSWORD = "shashi830";

/* LOGIN */
function login(){
  let p=document.getElementById("pass").value;

  if(p===ADMIN_PASSWORD){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("dashboard").style.display="block";
    loadMessages();
  }else{
    alert("Wrong password");
  }
}

/* NAV */
function showSection(id){
  document.getElementById("home").style.display="none";
  document.getElementById("messages").style.display="none";
  document.getElementById(id).style.display="block";
}

/* LOAD MESSAGES */
function loadMessages(){
  fetch(scriptURL+"?action=read")
  .then(r=>r.json())
  .then(data=>{
    let html="";

    data.reverse().forEach(m=>{
      html+=`
        <div class="card">
          <b>${m.name}</b><br>
          ${m.email}<br>
          ${m.message}<br>
          <small>${m.date}</small>
        </div>
      `;
    });

    document.getElementById("msgBox").innerHTML=html;
  });
}

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
