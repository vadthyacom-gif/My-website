<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODNEX.DEV — Sasikanth</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet">

<style>
:root {
  /* Spotify Color Palette */
  --bg-base: #121212;
  --bg-surface: #181818;
  --bg-elevated: #1f1f1f;
  --bg-card: #181818;
  --spotify-green: #1ed760;
  --text-primary: #ffffff;
  --text-secondary: #b3b3b3;
  --negative: #f3727f;
  
  /* Shadows & Transitions */
  --shadow-heavy: rgba(0,0,0,0.5) 0px 8px 24px;
  --shadow-medium: rgba(0,0,0,0.3) 0px 8px 8px;
  --transition: all 0.3s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

body { 
  background: var(--bg-base); 
  color: var(--text-primary); 
  font-family: 'Inter', sans-serif; /* Fallback for SpotifyMixUI */
  overflow-x: hidden;
  line-height: 1.6;
}

/* Scroll Bar - Functional Green */
#scrollBar { 
  position: fixed; 
  top: 0; 
  left: 0; 
  height: 3px; 
  background: var(--spotify-green); 
  z-index: 1000; 
  width: 0%; 
}

/* Navigation Header */
header { 
  position: fixed; 
  top: 0; 
  width: 100%; 
  padding: 16px 5%; 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  z-index: 100; 
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(20px);
}

.logo { 
  font-weight: 700; 
  font-size: 1.5rem; 
  letter-spacing: -0.5px; 
}
.logo span { color: var(--spotify-green); }

/* Sidebar - Immersive Dark */
#sidebar { 
  position: fixed; 
  top: 0; 
  left: -300px; 
  width: 280px; 
  height: 100%; 
  background: #000000; 
  z-index: 1001; 
  transition: 0.4s cubic-bezier(0.3, 0, 0, 1); 
  padding: 40px 24px; 
  display: flex; 
  flex-direction: column; 
  gap: 12px;
}
#sidebar.open { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }

#sidebar a { 
  color: var(--text-secondary); 
  text-decoration: none; 
  font-size: 14px; 
  font-weight: 700; 
  transition: var(--transition); 
  cursor: pointer;
  padding: 10px 0;
}
#sidebar a:hover { color: var(--text-primary); }

#overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); opacity: 0; visibility: hidden; z-index: 999; transition: 0.4s; }
#overlay.show { opacity: 1; visibility: visible; }

/* Hero Section */
section { padding: 100px 8%; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }

#home { text-align: center; background: linear-gradient(to bottom, #1f1f1f 0%, #121212 100%); }

.avatar-wrap { 
  width: 180px; 
  height: 180px; 
  border-radius: 50%; 
  margin: 0 auto 32px; 
  box-shadow: var(--shadow-heavy);
}
.avatar-wrap img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

h1 { 
  font-size: clamp(2.5rem, 6vw, 4rem); 
  font-weight: 700; 
  margin-bottom: 8px; 
  letter-spacing: -1.5px;
}

.typed-wrap { 
  font-family: 'Inter'; 
  color: var(--text-secondary); 
  font-size: 1.2rem; 
  margin-bottom: 40px; 
}

/* Primary Pill Button */
.btn-primary { 
  background: var(--spotify-green); 
  color: #000; 
  padding: 14px 32px; 
  font-weight: 700; 
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  cursor: pointer; 
  transition: var(--transition); 
  border-radius: 500px; /* Large Pill */
  text-decoration: none; 
  display: inline-block;
  border: none;
}
.btn-primary:hover { transform: scale(1.05); background: #1fdf64; }

/* Projects Grid */
.projects-grid { 
  display: grid; 
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
  gap: 24px; 
  margin-top: 40px; 
}

.card { 
  background: var(--bg-card); 
  padding: 16px;
  border-radius: 8px; 
  transition: background 0.3s ease; 
  cursor: pointer; 
}
.card:hover { background: #282828; }

.card-img { 
  width: 100%; 
  aspect-ratio: 1/1; 
  background: #333; 
  border-radius: 6px; 
  margin-bottom: 16px;
  box-shadow: var(--shadow-medium);
  overflow: hidden;
}
.card-img img { width: 100%; height: 100%; object-fit: cover; }

.card-info h3 { font-size: 16px; margin-bottom: 8px; }
.tag { 
  font-size: 12px; 
  color: var(--text-secondary); 
  display: block;
  margin-bottom: 4px;
}

/* Modals & Inputs */
#contactBox, #loginBox { 
  position: fixed; 
  top: 50%; 
  left: 50%; 
  transform: translate(-50%, -50%); 
  background: var(--bg-elevated); 
  padding: 48px; 
  border-radius: 8px; 
  z-index: 1005; 
  visibility: hidden; 
  opacity: 0; 
  transition: var(--transition); 
  box-shadow: var(--shadow-heavy);
  width: 90%; 
  max-width: 400px; 
}
#contactBox.open, #loginBox.show { visibility: visible; opacity: 1; }

input { 
  width: 100%; 
  padding: 14px; 
  margin: 12px 0; 
  background: #333; 
  border: 1px solid transparent; 
  color: white; 
  border-radius: 4px; 
  outline: none; 
}
input:focus { background: #444; }

.contact-link { 
  display: block; 
  padding: 12px; 
  color: var(--text-primary); 
  text-decoration: none; 
  font-weight: 600; 
  text-align: left;
}
.contact-link:hover { text-decoration: underline; }

.fade-up { opacity: 0; transform: translateY(20px); transition: 0.8s ease-out; }
.fade-up.visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div id="scrollBar"></div>
<div id="overlay" onclick="closeAll()"></div>

<header>
  <button style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;" onclick="toggleSidebar()">☰</button>
  <div class="logo">CODNEX<span>.DEV</span></div>
  <div style="width: 40px;"></div> </header>

<div id="sidebar">
  <div style="font-size:11px; font-weight:700; color:var(--text-secondary); letter-spacing: 1px; margin-bottom:20px; text-transform: uppercase;">Navigation</div>
  <a href="#home" onclick="closeSidebar()">Home</a>
  <a href="#projects" onclick="closeSidebar()">Projects</a>
  <a onclick="openContact()">Contact</a>
  <a onclick="openAdmin()">Admin</a>
</div>

<section id="home">
  <div class="avatar-wrap"><img src="profile.jpg" alt="Sasikanth"></div>
  <h1>Sasikanth Vadthya</h1>
  <div class="typed-wrap"><span id="typed"></span></div>
  <div>
    <a href="#projects" class="btn-primary">Explore Work</a>
  </div>
</section>

<section id="projects" class="fade-up">
  <h2 style="font-size: 24px; margin-bottom: 24px; font-weight: 700;">Selected Projects</h2>
  <div class="projects-grid">
    <div class="card" onclick="trackProjectUse('calculator.html')">
      <div class="card-img"><img src="project1.jpg" alt="Calculator"></div>
      <div class="card-info"><span class="tag">JavaScript</span><h3>Smart Calculator</h3></div>
    </div>
    <div class="card" onclick="trackProjectUse('currency.html')">
      <div class="card-img"><img src="project2.jpg" alt="Currency"></div>
      <div class="card-info"><span class="tag">API Integration</span><h3>Currency Converter</h3></div>
    </div>
    <div class="card" onclick="trackProjectUse('resume.html')">
      <div class="card-img"><img src="project3.jpg" alt="Resume"></div>
      <div class="card-info"><span class="tag">HTML/CSS</span><h3>Resume Builder</h3></div>
    </div>
  </div>
</section>

<div id="contactBox">
  <h2 style="margin-bottom: 24px;">Get In Touch</h2>
  <a href="mailto:vadthya.com@gmail.com" class="contact-link">Email</a>
  <a href="https://www.instagram.com/codnox.dev" target="_blank" class="contact-link">Instagram</a>
  <a href="https://wa.me/918309696024" target="_blank" class="contact-link">WhatsApp</a>
  <button onclick="closeAll()" style="margin-top:24px; background:none; border:none; color:var(--text-secondary); cursor:pointer; font-weight:700; font-size:12px; text-transform:uppercase;">Close</button>
</div>

<div id="loginBox">
    <div id="loginForm">
      <h2 style="margin-bottom:10px;">Admin</h2>
      <input id="username" placeholder="Username">
      <input id="password" type="password" placeholder="Password">
      <button class="btn-primary" style="width:100%; margin-top:10px;" onclick="login()">Login</button>
    </div>
    <div id="adminDashboard" style="display:none;">
      <h2>Stats</h2>
      <div style="margin: 20px 0; color: var(--spotify-green);">
        Visits: <span id="visitCount">0</span><br>
        Clicks: <span id="clickCount">0</span>
      </div>
      <button class="btn-primary" style="width:100%; background:var(--text-secondary);" onclick="logout()">Logout</button>
    </div>
    <button onclick="closeAll()" style="margin-top:20px; background:none; border:none; color:var(--text-secondary); cursor:pointer;">CLOSE</button>
</div>

<script>
// Firebase and original logic preserved
const firebaseConfig = { databaseURL: "https://portfolio-5ecc4-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
db.ref('stats/visits').transaction((c) => (c || 0) + 1);

function trackProjectUse(url) {
  db.ref('stats/projectClicks').transaction((c) => (c || 0) + 1);
  window.open(url, "_self");
}

function toggleSidebar(){ document.getElementById("sidebar").classList.add("open"); document.getElementById("overlay").classList.add("show"); }
function closeSidebar(){ document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").classList.remove("show"); }
function openContact(){ closeSidebar(); document.getElementById("contactBox").classList.add("open"); document.getElementById("overlay").classList.add("show"); }
function openAdmin(){ closeSidebar(); document.getElementById("loginBox").classList.add("show"); document.getElementById("overlay").classList.add("show"); }
function closeAll(){ document.getElementById("sidebar").classList.remove("open"); document.getElementById("contactBox").classList.remove("open"); document.getElementById("loginBox").classList.remove("show"); document.getElementById("overlay").classList.remove("show"); }

function login(){
  if(document.getElementById("username").value === "admin" && document.getElementById("password").value === "1234"){
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("adminDashboard").style.display = "block";
    db.ref('stats').on('value', (s) => {
      const d = s.val() || {visits:0, projectClicks:0};
      document.getElementById("visitCount").textContent = d.visits;
      document.getElementById("clickCount").textContent = d.projectClicks;
    });
  } else { alert("Access Denied"); }
}
function logout() { document.getElementById("loginForm").style.display="block"; document.getElementById("adminDashboard").style.display="none"; closeAll(); }

// Intersection Observer for fade-up
const observer = new IntersectionObserver((entries) => { entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('visible'); }); }, { threshold: 0.1 });
document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

// Typing Effect
const words=["Frontend Developer", "Creative Coder", "UI Designer"];
let i=0, j=0, isDel=false;
function type(){
  const current = words[i];
  document.getElementById("typed").textContent = isDel ? current.substring(0, j--) : current.substring(0, j++);
  if(!isDel && j > current.length){ isDel=true; setTimeout(type, 2000); }
  else if(isDel && j < 0){ isDel=false; i=(i+1)%words.length; setTimeout(type, 500); }
  else { setTimeout(type, isDel ? 50 : 100); }
}
type();

window.addEventListener("scroll",()=>{
  let s = (document.documentElement.scrollTop / (document.documentElement.scrollHeight - document.documentElement.clientHeight)) * 100;
  document.getElementById("scrollBar").style.width = s + "%";
});
</script>
</body>
</html>
