<!DOCTYPE html>
<html>
<head>
  <title>VADTHYA SASIKANTH</title>

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      position: sticky;
      top: 0;
    }

    nav {
      text-align: right;
    }

    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: cyan;
    }

    .hero {
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      padding: 60px 20px;
      text-align: center;
    }

    .hero img {
      width: 120px;
      border-radius: 50%;
      margin-top: 20px;
    }

    section {
      padding: 40px 20px;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .box {
      background: white;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .skills {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .skills div {
      background: #333;
      color: white;
      padding: 10px 20px;
      margin: 10px;
      border-radius: 20px;
    }

    input, textarea {
      width: 80%;
      padding: 10px;
      margin: 10px;
    }

    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<header>
  <h2>My Portfolio</h2>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO SECTION -->
<section id="home" class="hero">
  <h1>Hello, I'm [Your Name]</h1>
  <p>Aspiring Web Developer</p>

  <img src="profile.jpg">
</section>

<!-- ABOUT -->
<section id="about">
  <div class="container">
    <div class="box">
      <h2>About Me</h2>
      <p>I am learning web development and building real projects.</p>
    </div>
  </div>
</section>

<!-- SKILLS -->
<section id="skills">
  <h2>My Skills</h2>

  <div class="skills">
    <div>HTML</div>
    <div>CSS</div>
    <div>JavaScript</div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact Me</h2>

  <input type="text" placeholder="Your Name"><br>
  <input type="email" placeholder="Your Email"><br>
  <textarea placeholder="Your Message"></textarea><br>

  <button onclick="sendMessage()">Send</button>
</section>

<script>
  function sendMessage() {
    alert("Message sent!");
  }
</script>

</body>
</html>
