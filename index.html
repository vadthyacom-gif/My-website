<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(to right, #74ebd5, #9face6);
      text-align: center;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
    }

    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    section {
      padding: 20px;
    }

    .card {
      max-width: 400px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button {
      padding: 10px 20px;
      background: blue;
      color: white;
      border: none;
      border-radius: 5px;
    }

    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>My Website</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="about.html">About</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HOME SECTION -->
<section id="home">
  <div class="card">

    <h2>Welcome 👋</h2>

    <img src="profile.jpg" width="150"
         style="border-radius: 50%; display:block; margin:20px auto;">

    <p>This is my first real website</p>

    <button onclick="sayHello()">Click Me</button>

  </div>
</section>

<!-- CONTACT SECTION -->
<section id="contact">
  <div class="card">

    <h2>Contact Me</h2>

    <input type="text" placeholder="Your Name"><br>
    <input type="email" placeholder="Your Email"><br>
    <textarea placeholder="Your Message"></textarea><br>

    <button onclick="sendMessage()" style="background: green;">
      Send
    </button>

  </div>
</section>

<script>
  function sayHello() {
    alert("Welcome to my website!");
  }

  function sendMessage() {
    alert("Message sent successfully!");
  }
</script>

</body>
</html>
