<!DOCTYPE html>
<html>
<head>
    <title>Cricket Career Game - Master Edition</title>
    <style>
        body { font-family: Arial; background:#0b6623; color:white; text-align:center; padding: 20px; }
        button { padding:10px; margin:5px; cursor: pointer; background: #fff; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #ddd; }
        #game { margin-top:20px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px; min-height: 300px; }
        .card { border:1px solid white; padding:10px; margin:10px; display: inline-block; width: 150px; border-radius: 8px; }
        table { margin:auto; border-collapse: collapse; background: white; color: black; border-radius: 8px; overflow: hidden; }
        td, th { border:1px solid #ccc; padding:12px; }
        th { background: #333; color: white; }
        .controls { background: #054d1a; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>

<body>

<h1>🏏 Cricket Career Mode</h1>

<div class="controls">
    <button onclick="startCareer()">Start Career</button>
    <button onclick="playMatch()">Play Match</button>
    <button onclick="showStats()">View Stats</button>
    <button onclick="showSelection()">Selection Status</button>
    <button onclick="startAuction()">Enter Auction</button>
    <button onclick="startTournament()">Play Tournament</button>
</div>

<div id="game">
    <h2>Welcome, Player!</h2>
    <p>Click "Start Career" to begin your journey from Local Club to the National Team.</p>
</div>

<script>
// ---------------- 1. PLAYER DATA (COMBINED) ----------------
let player = {
    name: "You",
    team: "Local Club",
    batting: 50,
    bowling: 40,
    form: 50,
    level: 1,
    xp: 0,
    matches: 0,
    runs: 0,
    outs: 0,
    ballsFaced: 0,

    get average() {
        return this.outs === 0 ? this.runs : (this.runs / this.outs).toFixed(2);
    },
    get strikeRate() {
        return this.ballsFaced === 0 ? 0 : ((this.runs / this.ballsFaced) * 100).toFixed(2);
    }
};

// ---------------- 2. MATCH SYSTEM ----------------
let match = { runs: 0, wickets: 0, balls: 0 };

function startCareer() {
    document.getElementById("game").innerHTML =
        "<h2>Career Started!</h2><p>You are currently playing for: <strong>" + player.team + "</strong></p><p>Level 1 Player.</p>";
}

function playMatch() {
    match = { runs: 0, wickets: 0, balls: 0 };
    nextBall();
}

function nextBall() {
    // 120 balls = 20 overs
    if (match.balls >= 120 || match.wickets >= 10) {
        endMatch();
        return;
    }

    document.getElementById("game").innerHTML = `
        <h2>${player.team}</h2>
        <h3>Match Score: ${match.runs}/${match.wickets}</h3>
        <p>Ball: ${match.balls + 1} / 120</p>
        <div style="margin-top:20px;">
            <button onclick="playShot('defensive')">Defensive</button>
            <button onclick="playShot('drive')">Drive</button>
            <button onclick="playShot('loft')">Loft</button>
        </div>
    `;
}

function playShot(type) {
    // Combining outcome logic from all codes
    let timing = Math.random();
    let bonus = type === 'loft' ? 10 : (type === 'defensive' ? -10 : 0);
    let outcome = (timing * player.batting) + player.form + bonus - 30;

    match.balls++;
    player.ballsFaced++;

    let logText = "";

    if (outcome > 80) {
        match.runs += 6;
        player.runs += 6;
        logText = "SIX! What a hit!";
    } else if (outcome > 60) {
        match.runs += 4;
        player.runs += 4;
        logText = "FOUR! Beautifully timed.";
    } else if (outcome > 40) {
        let r = Math.floor(Math.random() * 3) + 1;
        match.runs += r;
        player.runs += r;
        logText = r + " run(s).";
    } else if (outcome < 20) {
        match.wickets++;
        player.outs++;
        logText = "OUT! Clean bowled.";
    } else {
        logText = "Dot ball.";
    }

    document.getElementById("game").innerHTML += `<p><strong>${logText}</strong></p>`;
    
    // Using a delay for "Defensive/Drive/Loft" feel, otherwise instant for quick play
    setTimeout(nextBall, 800);
}

function endMatch() {
    player.matches++;
    player.xp += match.runs;

    // Level up logic
    if (player.xp > player.level * 100) {
        player.level++;
        player.batting += 5;
        player.form += 5;
    }

    // Update form based on performance
    player.form += (match.runs / 10);
    if (player.form > 100) player.form = 100;

    document.getElementById("game").innerHTML = `
        <h2>Match Finished</h2>
        <p>Your Score: ${match.runs}/${match.wickets}</p>
        <hr>
        <p>Total Runs: ${player.runs}</p>
        <p>Level: ${player.level}</p>
        <p>Current Form: ${Math.floor(player.form)}</p>
        <button onclick="playMatch()">Play Next Match</button>
    `;
}

// ---------------- 3. STATS SYSTEM ----------------
function showStats() {
    document.getElementById("game").innerHTML = `
        <h2>Player Profile</h2>
        <div style="text-align: left; display: inline-block;">
            <p><strong>Team:</strong> ${player.team}</p>
            <p><strong>Matches:</strong> ${player.matches}</p>
            <p><strong>Total Runs:</strong> ${player.runs}</p>
            <p><strong>Average:</strong> ${player.average}</p>
            <p><strong>Strike Rate:</strong> ${player.strikeRate}</p>
            <p><strong>Level:</strong> ${player.level}</p>
            <p><strong>Form:</strong> ${Math.floor(player.form)}%</p>
        </div>
    `;
}

// ---------------- 4. SELECTION SYSTEM (SMART) ----------------
function showSelection() {
    let avg = parseFloat(player.average);
    let sr = parseFloat(player.strikeRate);
    let status = "Local Club";

    if (avg > 45 && sr > 130 && player.matches > 8) {
        status = "National Team 🇮🇳";
    } else if (avg > 35 && sr > 120 && player.matches > 5) {
        status = "Franchise League";
    } else if (avg > 25 && sr > 100 && player.matches > 3) {
        status = "Domestic Team";
    }

    player.team = status;

    document.getElementById("game").innerHTML = `
        <h2>Selection Committee</h2>
        <p>Based on your Average (${avg}) and SR (${sr}):</p>
        <h3>Status: ${status}</h3>
    `;
}

// ---------------- 5. AUCTION SYSTEM (SMART) ----------------
function startAuction() {
    let teamsList = [
        { name: "Chennai", budget: 500000 },
        { name: "Mumbai", budget: 600000 },
        { name: "Bangalore", budget: 450000 },
        { name: "Hyderabad", budget: 400000 }
    ];

    let playerValue = (player.average * 2000) + (player.strikeRate * 100) + (player.form * 500);
    let bids = [];

    teamsList.forEach(t => {
        let needFactor = Math.random() * 1.5;
        let bid = Math.min(playerValue * needFactor, t.budget);
        bids.push({ team: t.name, bid: Math.floor(bid) });
    });

    bids.sort((a, b) => b.bid - a.bid);
    let winner = bids[0];
    player.team = winner.team + " Franchise";

    let html = "<h2>IPL Style Auction</h2>";
    bids.forEach(b => {
        html += `<div class="card"><strong>${b.team}</strong><br>₹${b.bid.toLocaleString()}</div>`;
    });

    html += `<h3>🎉 Sold to: ${winner.team}</h3>
             <button onclick="playMatch()">Play for ${winner.team}</button>`;
    document.getElementById("game").innerHTML = html;
}

// ---------------- 6. TOURNAMENT SYSTEM ----------------
let tourneyTeams = [
    createTeam("Chennai"), createTeam("Mumbai"), createTeam("Bangalore"),
    createTeam("Hyderabad"), createTeam("Delhi"), createTeam("Kolkata")
];

function createTeam(name) {
    return {
        name: name, played: 0, won: 0, lost: 0, points: 0,
        runsFor: 0, oversFaced: 0, runsAgainst: 0, oversBowled: 0,
        get nrr() {
            if (this.oversFaced === 0) return "0.00";
            return ((this.runsFor / this.oversFaced) - (this.runsAgainst / this.oversBowled)).toFixed(2);
        }
    };
}

function startTournament() {
    tourneyTeams.forEach(t => {
        t.played = 0; t.won = 0; t.lost = 0; t.points = 0;
        t.runsFor = 0; t.oversFaced = 0; t.runsAgainst = 0; t.oversBowled = 0;
    });

    for (let i = 0; i < tourneyTeams.length; i++) {
        for (let j = i + 1; j < tourneyTeams.length; j++) {
            simulateMatch(tourneyTeams[i], tourneyTeams[j]);
        }
    }
    showPointsTable();
}

function simulateMatch(teamA, teamB) {
    let runsA = Math.floor(Math.random() * 200);
    let runsB = Math.floor(Math.random() * 200);
    let overs = 20;

    teamA.played++; teamB.played++;
    teamA.runsFor += runsA; teamA.oversFaced += overs; teamA.runsAgainst += runsB; teamA.oversBowled += overs;
    teamB.runsFor += runsB; teamB.oversFaced += overs; teamB.runsAgainst += runsA; teamB.oversBowled += overs;

    if (runsA > runsB) { teamA.won++; teamA.points += 2; teamB.lost++; } 
    else { teamB.won++; teamB.points += 2; teamA.lost++; }
}

function showPointsTable() {
    tourneyTeams.sort((a, b) => b.points - a.points || b.nrr - a.nrr);

    let html = "<h2>Tournament Standings</h2><table><tr><th>Team</th><th>P</th><th>W</th><th>Pts</th><th>NRR</th></tr>";
    tourneyTeams.forEach(t => {
        html += `<tr><td>${t.name}</td><td>${t.played}</td><td>${t.won}</td><td>${t.points}</td><td>${t.nrr}</td></tr>`;
    });
    html += "</table>";

    let top4 = tourneyTeams.slice(0, 4);
    let winner = simulateFinal(top4[0], top4[1]);
    html += `<h3 style="color: gold;">🏆 Tournament Winner: ${winner.name}</h3>`;
    document.getElementById("game").innerHTML = html;
}

function simulateFinal(teamA, teamB) {
    return Math.random() > 0.5 ? teamA : teamB;
}
</script>

</body>
</html>
