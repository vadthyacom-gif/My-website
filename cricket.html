<!DOCTYPE html>
<html>
<head>
    <title>Cricket Career Game - Pro Edition</title>
    <style>
        body { font-family: Arial, sans-serif; background:#0b6623; color:white; text-align:center; margin:0; padding:0; }
        .header { background:#111; padding:15px; font-size: 24px; font-weight: bold; }
        .menu { display:flex; justify-content:center; flex-wrap: wrap; background:#222; padding:10px; gap: 5px; }
        button { padding:10px 15px; cursor: pointer; background: #fff; border: none; border-radius: 4px; font-weight: bold; color: #333; }
        button:hover { background: #ddd; }
        #game { padding: 20px; min-height: 400px; }
        
        /* TIMING BAR STYLES */
        .bar { width:80%; height:25px; background:#444; margin:20px auto; position:relative; border-radius: 12px; border: 2px solid #fff; }
        .marker { width:12px; height:25px; background:red; position:absolute; left:0; border-radius: 2px; }
        .target { width:30px; height:25px; background:lime; position:absolute; left:45%; border-radius: 2px; }
        
        .card { border:1px solid white; padding:10px; margin:10px; display: inline-block; width: 150px; border-radius: 8px; background: rgba(0,0,0,0.3); }
        table { margin:auto; border-collapse: collapse; background: white; color: black; border-radius: 8px; overflow: hidden; width: 90%; max-width: 600px; }
        td, th { border:1px solid #ccc; padding:10px; }
        th { background: #333; color: white; }
    </style>
</head>

<body>

<div class="header">🏏 Cricket Career Pro Master</div>

<div class="menu">
    <button onclick="startCareer()">Career</button>
    <button onclick="playMatch()">Play Match</button>
    <button onclick="showStats()">Stats</button>
    <button onclick="showSelection()">Selection</button>
    <button onclick="startAuction()">Auction</button>
    <button onclick="startTournament()">Tournament</button>
</div>

<div id="game">
    <h2>Welcome to Career Mode</h2>
    <p>Hit "Start Career" to begin your journey.</p>
</div>

<script>
// ---------------- 1. GLOBAL DATA ----------------
let player = {
    name: "You",
    team: "Local Club",
    batting: 50, bowling: 40, form: 50,
    level: 1, xp: 0, matches: 0,
    runs: 0, outs: 0, ballsFaced: 0,
    get average() { return this.outs === 0 ? this.runs : (this.runs / this.outs).toFixed(2); },
    get strikeRate() { return this.ballsFaced === 0 ? 0 : ((this.runs / this.ballsFaced) * 100).toFixed(1); }
};

let match = { runs: 0, wickets: 0, balls: 0, overs: 20 };
let markerPos = 0;
let speed = 2;
let interval;

// ---------------- 2. CAREER & STATS ----------------
function startCareer() {
    document.getElementById("game").innerHTML = `<h2>Career Started</h2><p>Playing for: ${player.team}</p>`;
}

function showStats() {
    document.getElementById("game").innerHTML = `
        <h2>Player Stats</h2>
        <div style="text-align: left; display: inline-block; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px;">
            <p>Team: ${player.team}</p>
            <p>Matches: ${player.matches} | Level: ${player.level}</p>
            <p>Runs: ${player.runs} | Avg: ${player.average}</p>
            <p>Strike Rate: ${player.strikeRate} | Form: ${Math.floor(player.form)}%</p>
        </div>
    `;
}

// ---------------- 3. AI & TIMING MATCH SYSTEM ----------------
function aiBowlingStrategy() {
    let r = Math.random();
    if(r < 0.3) return "Yorker";
    if(r < 0.6) return "Bouncer";
    return "Good Length";
}

function aiField() {
    return player.form > 70 ? "Defensive Field" : "Attacking Field";
}

function playMatch() {
    match = { runs: 0, wickets: 0, balls: 0, overs: 20 };
    nextBall();
}

function nextBall() {
    if (match.balls >= 120 || match.wickets >= 10) {
        endMatch();
        return;
    }

    let bowlType = aiBowlingStrategy();
    let field = aiField();

    document.getElementById("game").innerHTML = `
        <h2>${player.team}</h2>
        <h3>Score: ${match.runs}/${match.wickets}</h3>
        <p>Ball: ${match.balls + 1} | Bowler: <strong>${bowlType}</strong></p>
        <p>Field Setting: <em>${field}</em></p>

        <div class="bar">
            <div class="target"></div>
            <div id="marker" class="marker"></div>
        </div>

        <button onclick="hitShot()">HIT BALL!</button>
        <p style="font-size: 0.8em; margin-top:10px;">Stop the red marker on the green zone!</p>
    `;

    markerPos = 0;
    speed = 2 + (Math.random() * 4) + (player.level * 0.2); // Speed increases with level

    clearInterval(interval);
    interval = setInterval(moveMarker, 20);
}

function moveMarker() {
    markerPos += speed;
    if (markerPos > 100) markerPos = 0;
    let m = document.getElementById("marker");
    if(m) m.style.left = markerPos + "%";
}

function hitShot() {
    clearInterval(interval);
    let diff = Math.abs(markerPos - 46); // 46 is roughly center of green target
    let outcome;

    if (diff < 6) outcome = "perfect";
    else if (diff < 16) outcome = "good";
    else outcome = "bad";

    processOutcome(outcome);
}

function processOutcome(type) {
    match.balls++;
    player.ballsFaced++;
    let text = "";

    if (type === "perfect") {
        match.runs += 6; player.runs += 6;
        text = "🚀 HUGE SIX! Perfect Timing!";
    } else if (type === "good") {
        let r = Math.floor(Math.random() * 4) + 1;
        match.runs += r; player.runs += r;
        text = `🏏 ${r} Run(s). Good Shot.`;
    } else {
        if (Math.random() < 0.4) {
            match.wickets++; player.outs++;
            text = "☝️ OUT! Poor Timing.";
        } else {
            text = "Dot Ball.";
        }
    }

    document.getElementById("game").innerHTML += `<h3>${text}</h3>`;
    setTimeout(nextBall, 1000);
}

function endMatch() {
    player.matches++;
    player.xp += match.runs;
    if (player.xp > player.level * 100) { player.level++; player.batting += 5; }
    player.form = Math.min(100, player.form + (match.runs / 10));

    document.getElementById("game").innerHTML = `
        <h2>Innings Over</h2>
        <p>Score: ${match.runs}/${match.wickets}</p>
        <button onclick="playMatch()">Play Next</button>
    `;
}

// ---------------- 4. SELECTION & AUCTION ----------------
function showSelection() {
    let avg = parseFloat(player.average);
    let sr = parseFloat(player.strikeRate);
    let status = "Local Club";

    if (avg > 50 && sr > 130) status = "India 🇮🇳";
    else if (avg > 40 && sr > 120) status = "Franchise League";
    else if (avg > 30 && sr > 110) status = "Domestic Team";

    player.team = status;
    document.getElementById("game").innerHTML = `<h2>Selection Status</h2><h3>Current Grade: ${status}</h3><p>Avg: ${avg} | SR: ${sr}</p>`;
}

function startAuction() {
    let teamsList = ["Chennai", "Mumbai", "Bangalore", "Hyderabad", "Delhi"];
    let bids = [];
    let playerVal = (parseFloat(player.average) * 2000) + (parseFloat(player.strikeRate) * 500);

    teamsList.forEach(t => {
        let bid = Math.floor(playerVal * (0.5 + Math.random()));
        bids.push({ name: t, bid: bid });
    });

    bids.sort((a, b) => b.bid - a.bid);
    player.team = bids[0].name;

    let html = "<h2>Auction Results</h2>";
    bids.forEach(b => { html += `<div class="card">${b.name}<br>₹${b.bid.toLocaleString()}</div>`; });
    html += `<h3>Sold to: ${bids[0].name}</h3>`;
    document.getElementById("game").innerHTML = html;
}

// ---------------- 5. TOURNAMENT & DLS ----------------
function applyDLS(score, oversLeft) {
    return Math.floor(score * (oversLeft / 20));
}

function startTournament() {
    let rain = Math.random() < 0.3;
    let baseScore = Math.floor(Math.random() * 100) + 100;
    
    if (rain) {
        let target = applyDLS(baseScore, 10);
        document.getElementById("game").innerHTML = `<h2>🌧️ Rain Interruption!</h2><p>DLS Method Applied.</p><h3>New Target: ${target} in 10 overs</h3>`;
    } else {
        document.getElementById("game").innerHTML = `<h2>☀️ Clear Skies</h2><p>Tournament Match Simulated.</p><h3>Opponent Score: ${baseScore}</h3>`;
    }
    
    // Quick Points Table Simulation from Code 4
    let teams = ["Mumbai", "Chennai", "Delhi", "Bangalore"].map(n => ({name:n, pts: Math.floor(Math.random()*10)}));
    teams.sort((a,b)=> b.pts - a.pts);
    let table = "<table><tr><th>Team</th><th>Points</th></tr>";
    teams.forEach(t => table += `<tr><td>${t.name}</td><td>${t.pts}</td></tr>`);
    document.getElementById("game").innerHTML += table + "</table>";
}

</script>
</body>
</html>
