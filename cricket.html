<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Career 26 - Ultra Pro</title>
    <style>
        :root { --primary: #cf0a2c; --gold: #ffd700; --bg: #050505; --card: #121212; --accent: #00ffaa; }
        body { font-family: 'Syne', sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        
        .game-header { display: flex; justify-content: space-between; padding: 10px; background: var(--card); border-radius: 10px; margin-bottom: 10px; border-bottom: 2px solid var(--primary); }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px; }
        .stat-card { background: var(--card); padding: 8px; border-radius: 8px; border: 1px solid #222; }
        .stat-label { font-size: 9px; color: #777; display: block; }
        .stat-val { font-size: 14px; font-weight: bold; color: var(--gold); }

        /* Match Engine UI */
        #matchEngine { display: none; background: #000; padding: 20px; border-radius: 20px; border: 1px solid var(--accent); position: fixed; inset: 10px; z-index: 2000; flex-direction: column; }
        .pitch-view { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #333; margin: 15px 0; border-radius: 15px; background: linear-gradient(#1a1a1a, #0a0a0a); }
        .ball-display { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 20px var(--primary); margin-bottom: 20px; display:none; }
        
        .shot-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .control-btn { background: #222; border: 1px solid #444; color: white; padding: 15px; border-radius: 10px; font-weight: bold; }
        .control-btn:active { background: var(--accent); color: black; }

        /* Career Hub */
        .tourney-banner { background: linear-gradient(45deg, #1a1a1a, #2c3e50); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        button { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .secondary { background: #333; font-size: 14px; }

        .log { height: 80px; overflow-y: scroll; font-size: 11px; color: #888; background: #000; padding: 10px; border-radius: 8px; text-align: left; margin-top: 10px; }
        
        #auctionOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div class="game-header">
        <div style="font-weight: 800; font-size: 1.2rem;">PRO<span style="color:var(--primary);">CAREER</span></div>
        <div id="gameDate" style="color:var(--accent); font-family:monospace;">Apr 2026</div>
    </div>

    <div class="stat-grid">
        <div class="stat-card"><span class="stat-label">EXP</span><span id="xp" class="stat-val">0</span></div>
        <div class="stat-card"><span class="stat-label">RUNS</span><span id="runs" class="stat-val">0</span></div>
        <div class="stat-card"><span class="stat-label">AVG</span><span id="avg" class="stat-val">0.0</span></div>
        <div class="stat-card"><span class="stat-label">AURA</span><span id="aura" class="stat-val">100</span></div>
    </div>

    <div class="tourney-banner">
        <div id="tourneyTitle" style="font-size: 18px; font-weight: 800;">IPL Season 2026</div>
        <div id="teamName" style="color:var(--accent); font-size: 12px;">Mumbai Indians</div>
    </div>

    <button onclick="startMatch()">Enter Match Day</button>
    <button class="secondary" onclick="skipMonth()">Management / Training</button>

    <div class="log" id="log">The Selector's AI is watching your next 5 matches for National selection.</div>

    <div id="matchEngine">
        <div style="display:flex; justify-content:space-between; font-size:14px;">
            <div>Runs: <span id="matchRuns" style="color:var(--gold)">0</span></div>
            <div id="bowlerType" style="color:#aaa">Pace: M. Shami</div>
        </div>

        <div class="pitch-view">
            <div id="ball" class="ball-display"></div>
            <div id="commentary" style="padding:10px; color:var(--accent); text-align:center;">Bowler is running in...</div>
        </div>

        <div class="shot-controls">
            <button class="control-btn" onclick="playShot('Defensive')">🛡️ Defend</button>
            <button class="control-btn" onclick="playShot('Drive')">🏏 Drive</button>
            <button class="control-btn" onclick="playShot('Pull')">🔥 Pull</button>
            <button class="control-btn" onclick="playShot('Loft')">🚀 Lofted</button>
        </div>
        <p style="font-size:10px; color:#555; margin-top:10px;">Select shot as the ball appears!</p>
    </div>

    <div id="auctionOverlay">
        <h1 style="color:var(--gold)">IPL AUCTION</h1>
        <div id="auctionWar" style="margin:20px; font-size:20px;"></div>
        <button onclick="closeAuction()">Sign Contract</button>
    </div>

    <script>
        let career = {
            runs: 0, xp: 0, matches: 0, aura: 100,
            power: 10, timing: 10,
            year: 2026, month: 3,
            team: "Domestic Club",
            isOut: false, matchRuns: 0
        };

        const bowlers = [
            { name: "M. Shami", type: "Pace", difficulty: 1.2 },
            { name: "Rashid Khan", type: "Spin", difficulty: 1.5 },
            { name: "J. Bumrah", type: "Pace", difficulty: 1.8 }
        ];

        // --- MATCH ENGINE LOGIC ---
        function startMatch() {
            career.isOut = false;
            career.matchRuns = 0;
            document.getElementById('matchEngine').style.display = 'flex';
            document.getElementById('matchRuns').innerText = "0";
            nextBall();
        }

        function nextBall() {
            if(career.isOut) return;
            
            let ball = document.getElementById('ball');
            let comm = document.getElementById('commentary');
            ball.style.display = 'none';
            comm.innerText = "Bowler is running in...";

            setTimeout(() => {
                ball.style.display = 'block';
                comm.innerText = "PLAY SHOT NOW!";
            }, 1000);
        }

        function playShot(type) {
            if(career.isOut) return;
            
            let ball = document.getElementById('ball');
            if(ball.style.display === 'none') {
                log("Too Early! You missed the timing.");
                return;
            }

            let chance = Math.random() * career.timing;
            let outcome = 0;

            if(type === 'Defensive') outcome = (Math.random() > 0.1) ? 1 : 0;
            if(type === 'Drive') outcome = (Math.random() > 0.3) ? 4 : 0;
            if(type === 'Pull') outcome = (Math.random() > 0.4) ? 6 : 0;
            if(type === 'Loft') outcome = (Math.random() > 0.6) ? 6 : -1; // High risk

            if(outcome === -1 || (Math.random() < 0.05)) {
                career.isOut = true;
                document.getElementById('commentary').innerText = "OUT! Caught at Deep Mid-Wicket.";
                setTimeout(() => exitMatch(), 2000);
            } else {
                career.matchRuns += outcome;
                document.getElementById('matchRuns').innerText = career.matchRuns;
                document.getElementById('commentary').innerText = outcome + " Runs!";
                nextBall();
            }
        }

        function exitMatch() {
            career.runs += career.matchRuns;
            career.matches++;
            career.xp += (career.matchRuns * 2);
            career.aura += (career.matchRuns > 50) ? 20 : -5;
            
            document.getElementById('matchEngine').style.display = 'none';
            updateUI();
            log(`Finished match with ${career.matchRuns} runs.`);
            checkSelections();
        }

        // --- CAREER SYSTEMS ---
        function checkSelections() {
            if(career.runs > 500 && career.team === "Domestic Club") {
                career.team = "India A";
                log("PROMOTED: You've been selected for India A!");
            }
        }

        function skipMonth() {
            career.month++;
            if(career.month > 11) { career.month = 0; career.year++; }
            if(career.month === 3) triggerAuction();
            updateUI();
        }

        function triggerAuction() {
            document.getElementById('auctionOverlay').style.display = 'flex';
            document.getElementById('auctionWar').innerText = "Bidding War: RCB vs MI...";
        }

        function closeAuction() {
            document.getElementById('auctionOverlay').style.display = 'none';
            career.team = "Mumbai Indians";
            updateUI();
        }

        function updateUI() {
            document.getElementById('runs').innerText = career.runs;
            document.getElementById('xp').innerText = career.xp;
            document.getElementById('aura').innerText = career.aura;
            document.getElementById('avg').innerText = (career.runs / Math.max(1, career.matches)).toFixed(1);
            document.getElementById('teamName').innerText = career.team;
            document.getElementById('gameDate').innerText = career.year;
        }

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML = "• " + msg + "<br>" + l.innerHTML;
        }

        updateUI();
    </script>
</body>
</html>
