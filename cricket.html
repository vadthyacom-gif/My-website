<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Career 26 - Strategic Pro</title>
    <style>
        :root { --primary: #cf0a2c; --gold: #ffd700; --bg: #050505; --card: #121212; --accent: #00ffaa; }
        body { font-family: 'Syne', sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 10px; }
        
        .full-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 5000; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .input-group { margin: 15px 0; text-align: left; }
        select, input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; margin-top: 5px; }

        .lifecycle-bar { display: flex; justify-content: space-between; margin: 10px 0; background: #1a1a1a; padding: 10px; border-radius: 20px; font-size: 9px; border: 1px solid #333; }
        .stage { opacity: 0.3; }
        .stage.active { opacity: 1; color: var(--accent); font-weight: bold; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .stat-card { background: var(--card); padding: 8px; border-radius: 8px; border: 1px solid #222; }
        .stat-label { font-size: 9px; color: #777; display: block; }
        .stat-val { font-size: 14px; font-weight: bold; color: var(--gold); }

        .standings-box { background: var(--card); border-radius: 12px; margin-top: 15px; padding: 10px; border: 1px solid #333; }
        table { width: 100%; font-size: 10px; border-collapse: collapse; }
        th { color: #555; text-align: left; padding: 4px; }
        td { padding: 6px 4px; border-bottom: 1px solid #222; text-align: left; }
        .highlight { color: var(--accent); font-weight: bold; }

        #matchSimOverlay { display: none; background: rgba(0,0,0,0.95); position: fixed; inset: 0; z-index: 2000; flex-direction: column; justify-content: center; padding: 30px; }
        .match-card { background: var(--card); border: 2px solid var(--primary); padding: 25px; border-radius: 20px; }

        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; }
        .log { height: 70px; overflow-y: scroll; font-size: 11px; color: #888; background: #000; padding: 10px; border-radius: 8px; text-align: left; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="creatorOverlay" class="full-overlay">
        <h1 style="color:var(--gold)">NEW CAREER</h1>
        <div class="input-group">
            <label>Name</label><input type="text" id="pName" placeholder="Nawab Ali">
        </div>
        <div class="input-group">
            <label>Playstyle</label>
            <select id="pRole">
                <option value="1.2">Aggressive (High Risk)</option>
                <option value="1.0">Balanced</option>
                <option value="0.8">Defensive (Anchor)</option>
            </select>
        </div>
        <button onclick="initCareer()" style="background:var(--accent); color:black;">BEGIN JOURNEY</button>
    </div>

    <div id="retirementScreen" class="full-overlay" style="display:none;">
        <h1 style="color:var(--gold)">CAREER ENDED</h1>
        <h2 id="legacyTitle">LOCAL LEGEND</h2>
        <div class="stat-grid">
            <div class="stat-card"><span class="stat-label">RUNS</span><span id="finalRuns" class="stat-val">0</span></div>
            <div class="stat-card"><span class="stat-label">AVG</span><span id="finalAvg" class="stat-val">0</span></div>
            <div class="stat-card"><span class="stat-label">STAGE</span><span id="finalStage" class="stat-val">0</span></div>
        </div>
        <button onclick="location.reload()">NEW LEGACY</button>
    </div>

    <div style="display:flex; justify-content: space-between; padding: 10px;">
        <div id="dispName" style="font-weight: 800;">PLAYER</div>
        <div style="color:var(--accent)">Age: <span id="dispAge">16</span></div>
    </div>

    <div class="lifecycle-bar">
        <span class="stage active" id="s1">Youth</span> • <span class="stage" id="s2">Domestic</span> • <span class="stage" id="s3">Franchise</span> • <span class="stage" id="s4">International</span>
    </div>

    <div class="stat-grid">
        <div class="stat-card"><span class="stat-label">TOTAL RUNS</span><span id="runs" class="stat-val">0</span></div>
        <div class="stat-card"><span class="stat-label">TEAM PTS</span><span id="ptsDisplay" class="stat-val">0</span></div>
        <div class="stat-card"><span class="stat-label">AURA</span><span id="aura" class="stat-val">100</span></div>
    </div>

    <div id="tourneyInfo" style="font-size: 12px; color: var(--gold); margin-bottom: 5px;">Youth District League</div>
    <button onclick="openMatchMenu()">ENTER MATCH DAY</button>

    <div class="standings-box">
        <table>
            <thead><tr><th>TEAM</th><th>P</th><th>W</th><th>L</th><th>NRR</th><th>PTS</th></tr></thead>
            <tbody id="standingsBody"></tbody>
        </table>
    </div>

    <div class="log" id="log">Welcome. Advance through leagues by scoring runs.</div>

    <div id="matchSimOverlay">
        <div class="match-card">
            <h2 id="matchVs">Vs Lions XI</h2>
            <p style="color:#777; font-size:12px;">Choose your batting approach for this match:</p>
            <button onclick="simMatch(1.5)" style="background:#ff4444;">Aggressive (High RR)</button>
            <button onclick="simMatch(1.0)" style="background:var(--accent); color:black;">Balanced</button>
            <button onclick="simMatch(0.5)" style="background:#44aaff;">Defensive (Safety)</button>
        </div>
    </div>

    <script>
        let leagueData = [
            { name: "Your Team", p: 0, w: 0, l: 0, nrr: 0, pts: 0 },
            { name: "Lions XI", p: 0, w: 0, l: 0, nrr: 0.1, pts: 0 },
            { name: "Strikers", p: 0, w: 0, l: 0, nrr: -0.2, pts: 0 },
            { name: "Titans", p: 0, w: 0, l: 0, nrr: 0.5, pts: 0 },
            { name: "Warriors", p: 0, w: 0, l: 0, nrr: -0.4, pts: 0 }
        ];

        let career = {
            name: "", age: 16, runs: 0, matches: 0, aura: 100, stage: 1, roleMult: 1.0,
            leagueName: "Youth District League"
        };

        function initCareer() {
            career.name = document.getElementById('pName').value || "Nawab Ali";
            career.roleMult = parseFloat(document.getElementById('pRole').value);
            document.getElementById('creatorOverlay').style.display = 'none';
            document.getElementById('dispName').innerText = career.name;
            updateStandings();
            updateUI();
        }

        function openMatchMenu() {
            document.getElementById('matchSimOverlay').style.display = 'flex';
        }

        function simMatch(risk) {
            document.getElementById('matchSimOverlay').style.display = 'none';
            
            // Strategic Algorithm
            let baseScore = Math.floor(Math.random() * 50);
            let performance = (baseScore * risk * career.roleMult);
            let isOut = Math.random() < (0.2 * risk); // Higher risk = higher chance of low score/out
            
            let matchScore = isOut ? Math.floor(performance / 2) : Math.floor(performance);
            
            career.runs += matchScore;
            career.matches++;
            career.age += 0.5;

            // Tournament Logic
            let myTeam = leagueData.find(t => t.name === "Your Team");
            myTeam.p++;
            
            if(matchScore > 30) {
                myTeam.w++; myTeam.pts += 2; myTeam.nrr += (matchScore/150);
                log(`MATCH: You scored ${matchScore}. TEAM WON!`);
            } else {
                myTeam.l++; myTeam.nrr -= 0.05;
                log(`MATCH: You scored ${matchScore}. TEAM LOST.`);
            }

            // Sim Opponents
            leagueData.forEach(t => {
                if(t.name !== "Your Team") {
                    t.p++;
                    if(Math.random() > 0.5) { t.w++; t.pts += 2; t.nrr += 0.02; }
                    else { t.l++; t.nrr -= 0.02; }
                }
            });

            checkProgression();
            if(career.age >= 40) retire();
            updateUI();
            updateStandings();
        }

        function updateStandings() {
            const body = document.getElementById('standingsBody');
            leagueData.sort((a,b) => b.pts - a.pts || b.nrr - a.nrr);
            body.innerHTML = "";
            leagueData.forEach(t => {
                let rowClass = t.name === "Your Team" ? "class='highlight'" : "";
                body.innerHTML += `<tr ${rowClass}><td>${t.name}</td><td>${t.p}</td><td>${t.w}</td><td>${t.l}</td><td>${t.nrr.toFixed(2)}</td><td>${t.pts}</td></tr>`;
            });
        }

        function checkProgression() {
            const thresholds = [0, 400, 2000, 6000];
            const names = ["", "Domestic Pro", "Franchise Star", "International Legend"];
            
            if(career.runs > thresholds[career.stage] && career.stage < 4) {
                career.stage++;
                career.leagueName = names[career.stage-1];
                leagueData.forEach(t => { t.p=0; t.w=0; t.l=0; t.nrr=0; t.pts=0; }); // Reset League
                log(`PROMOTED to ${career.leagueName}!`);
            }
        }

        function retire() {
            document.getElementById('retirementScreen').style.display = 'flex';
            document.getElementById('finalRuns').innerText = career.runs;
            document.getElementById('finalAvg').innerText = (career.runs / career.matches).toFixed(1);
            document.getElementById('finalStage').innerText = career.stage;
        }

        function updateUI() {
            document.getElementById('runs').innerText = career.runs;
            document.getElementById('ptsDisplay').innerText = leagueData.find(t => t.name === "Your Team").pts;
            document.getElementById('dispAge').innerText = Math.floor(career.age);
            document.getElementById('tourneyInfo').innerText = career.leagueName;
            for(let i=1; i<=4; i++) {
                document.getElementById('s'+i).classList.toggle('active', i === career.stage);
            }
        }

        function log(m) { 
            const l = document.getElementById('log'); 
            l.innerHTML = "• "+m+"<br>"+l.innerHTML; 
        }
    </script>
</body>
</html>
