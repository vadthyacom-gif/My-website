<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Cricket Game</title>

<style>
body {
  background:#0d1117;
  color:white;
  font-family:Arial;
  text-align:center;
}

canvas {
  background:#111;
  margin-top:20px;
  border:2px solid #333;
}

button {
  padding:10px;
  margin:10px;
  background:#238636;
  border:none;
  color:white;
  cursor:pointer;
}

.scoreboard {
  margin-top:15px;
}
</style>
</head>

<body>

<h1>🏏 Advanced Cricket Game</h1>

<canvas id="gameCanvas" width="400" height="300"></canvas>

<div>
  <button onclick="startBall()">Start Ball</button>
  <button onclick="playShot()">Play Shot</button>
</div>

<div class="scoreboard">
  Runs: <span id="runs">0</span> |
  Wickets: <span id="wickets">0</span><br>
  Overs: <span id="overs">0.0</span><br>
  XP: <span id="xp">0</span> | Level: <span id="level">1</span>
</div>

<p id="log"></p>

<script>
// GAME STATE
let runs = 0, wickets = 0;
let balls = 0, overs = 0;
let xp = 0, level = 1;

let ballActive = false;
let ballY = 0;
let speed = 2;
let timingWindow = 260;

// CANVAS
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// DRAW LOOP
function draw() {
  ctx.clearRect(0,0,400,300);

  // Pitch
  ctx.fillStyle = "#654321";
  ctx.fillRect(180,0,40,300);

  // Ball
  if(ballActive){
    ctx.beginPath();
    ctx.arc(200, ballY, 8, 0, Math.PI*2);
    ctx.fillStyle="red";
    ctx.fill();

    ballY += speed;

    if(ballY > 300){
      ballActive = false;
      nextBall();
    }
  }

  requestAnimationFrame(draw);
}
draw();

// START BALL (AI BOWLER)
function startBall(){
  if(ballActive) return;

  ballY = 0;
  ballActive = true;

  // AI difficulty scaling
  speed = 2 + level * 0.5;
  timingWindow = 250 - level * 10;

  document.getElementById("log").innerText = "Ball delivered!";
}

// PLAY SHOT (TIMING SYSTEM)
function playShot(){
  if(!ballActive) return;

  let diff = Math.abs(ballY - timingWindow);

  let result = "";

  if(diff < 10){
    runs += 6;
    xp += 20;
    result = "🔥 PERFECT SIX!";
  }
  else if(diff < 25){
    runs += 4;
    xp += 10;
    result = "⚡ FOUR!";
  }
  else if(diff < 50){
    runs += 2;
    xp += 5;
    result = "2 runs";
  }
  else if(diff < 80){
    runs += 1;
    xp += 2;
    result = "1 run";
  }
  else{
    wickets++;
    result = "❌ OUT!";
  }

  ballActive = false;
  nextBall();
  updateUI(result);
}

// NEXT BALL LOGIC
function nextBall(){
  balls++;

  if(balls % 6 === 0){
    overs++;
  }

  updateOvers();

  if(wickets >= 5 || overs >= 2){
    document.getElementById("log").innerText =
      "Game Over! Final Score: " + runs;
    return;
  }
}

// UPDATE UI
function updateUI(msg){
  document.getElementById("runs").innerText = runs;
  document.getElementById("wickets").innerText = wickets;
  document.getElementById("xp").innerText = xp;

  // LEVEL UP SYSTEM
  if(xp >= level * 50){
    level++;
    xp = 0;
    document.getElementById("level").innerText = level;
    msg += " 🎉 LEVEL UP!";
  }

  document.getElementById("log").innerText = msg;
}

// OVERS FORMAT
function updateOvers(){
  let over = Math.floor(balls / 6);
  let ball = balls % 6;
  document.getElementById("overs").innerText = over + "." + ball;
}
</script>

</body>
</html>
