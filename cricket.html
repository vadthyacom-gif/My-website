<!DOCTYPE html>
<html>
<head>
    <title>Cricket Career Pro: Elite Edition</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background:#0b6623; color:white; text-align:center; margin:0; padding:0; }
        .header { background:#111; padding:15px; font-size: 24px; font-weight: bold; border-bottom: 3px solid #f1c40f; }
        .stats-bar { background: #1e1e1e; padding: 5px; font-size: 14px; display: flex; justify-content: center; gap: 20px; }
        .menu { display:flex; justify-content:center; flex-wrap: wrap; background:#222; padding:10px; gap: 5px; }
        
        button { padding:10px 15px; cursor: pointer; background: #fff; border: none; border-radius: 4px; font-weight: bold; color: #333; transition: 0.2s; }
        button:hover { background: #f1c40f; transform: translateY(-2px); }
        button:disabled { background: #555; cursor: not-allowed; }

        #game { padding: 20px; min-height: 450px; background: linear-gradient(to bottom, #0b6623, #054d1a); }
        
        /* TIMING BAR */
        .bar { width:80%; height:30px; background:#444; margin:20px auto; position:relative; border-radius: 15px; border: 3px solid #fff; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .marker { width:14px; height:30px; background:red; position:absolute; left:0; border-radius: 4px; box-shadow: 0 0 10px red; }
        .target { width:40px; height:30px; background:lime; position:absolute; left:45%; border-radius: 4px; }
        
        .card { border:1px solid #f1c40f; padding:15px; margin:10px; display: inline-block; width: 180px; border-radius: 12px; background: rgba(0,0,0,0.5); vertical-align: top; }
        table { margin:auto; border-collapse: collapse; background: white; color: black; border-radius: 8px; overflow: hidden; width: 95%; }
        td, th { border:1px solid #ccc; padding:10px; }
        .commentary { font-style: italic; color: #f1c40f; margin-top: 10px; min-height: 1.2em; }
    </style>
</head>

<body onload="updateTopBar()">

<div class="header">🏏 Cricket Career Pro: Elite</div>

<div id="topBar" class="stats-bar">
    </div>

<div class="menu">
    <button onclick="startCareer()">Career</button>
    <button onclick="playMatch()">Play Match</button>
    <button onclick="showShop()">Shop & Training</button>
    <button onclick="showStats()">Stats</button>
    <button onclick="showSelection()">Selection</button>
    <button onclick="startAuction()">Auction</button>
    <button onclick="startTournament()">Tournament</button>
</div>

<div id="game">
    <h2>Welcome, Elite Cricketer!</h2>
    <p>Manage your stamina, buy better gear, and climb the world rankings.</p>
</div>

<script>
// ---------------- GLOBAL DATA (ALL CODES COMBINED + NEW) ----------------
let player = {
    name: "You",
    team: "Local Club",
    batting: 50, bowling: 40, form: 50,
    level: 1, xp: 0, matches: 0,
    runs: 0, outs: 0, ballsFaced: 0,
    // NEW NEXT LEVEL STATS
    money: 500,
    stamina: 100,
    gear: "Standard Bat",
    powerHitUnlocked: false,

    get average() { return this.outs === 0 ? this.runs : (this.runs / this.outs).toFixed(2); },
    get strikeRate() { return this.ballsFaced === 0 ? 0 : ((this.runs / this.ballsFaced) * 100).toFixed(1); }
};

let match = { runs: 0, wickets: 0, balls: 0, overs: 20 };
let markerPos = 0;
let speed = 2;
let interval;

function updateTopBar() {
    document.getElementById("topBar").innerHTML = `
        <span>💰 ₹${player.money}</span>
        <span>⚡ Stamina: ${Math.floor(player.stamina)}%</span>
        <span>⭐ Level: ${player.level}</span>
        <span>🏏 Gear: ${player.gear}</span>
    `;
}

// ---------------- SHOP & TRAINING ----------------
function showShop() {
    let html = `<h2>Elite Sports Shop & Gym</h2>`;
    html += `
        <div class="card">
            <h4>Energy Drink</h4>
            <p>+30 Stamina</p>
            <button onclick="buyItem('drink', 100)">Buy (₹100)</button>
        </div>
        <div class="card">
            <h4>Pro Willow Bat</h4>
            <p>Easier Timing</p>
            <button onclick="buyItem('bat', 1500)" ${player.gear === "Pro Willow" ? 'disabled' : ''}>Buy (₹1500)</button>
        </div>
        <div class="card">
            <h4>Net Session</h4>
            <p>+5 Batting Skill</p>
            <button onclick="buyItem('train', 300)">Train (₹300)</button>
        </div>
    `;
    document.getElementById("game").innerHTML = html;
}

function buyItem(type, price) {
    if (player.money >= price) {
        player.money -= price;
        if (type === 'drink') player.stamina = Math.min(100, player.stamina + 30);
        if (type === 'bat') player.gear = "Pro Willow";
        if (type === 'train') player.batting += 5;
        alert("Purchase Successful!");
        updateTopBar();
        showShop();
    } else {
        alert("Not enough money!");
    }
}

// ---------------- UPDATED MATCH SYSTEM ----------------
function playMatch() {
    if (player.stamina < 20) {
        alert("Too tired! Go to the gym or drink an energy drink.");
        return;
    }
    match = { runs: 0, wickets: 0, balls: 0, overs: 20 };
    nextBall();
}

function nextBall() {
    if (match.balls >= 120 || match.wickets >= 10) {
        endMatch();
        return;
    }

    let bowlType = ["Yorker", "Bouncer", "In-swinger", "Leg Break"][Math.floor(Math.random()*4)];
    
    document.getElementById("game").innerHTML = `
        <h2 style="color:#f1c40f">${player.team} Innings</h2>
        <h3>Score: ${match.runs}/${match.wickets} (Overs: ${Math.floor(match.balls/6)}.${match.balls%6})</h3>
        <p>Bowler is running in... <strong>${bowlType}</strong> incoming!</p>

        <div class="bar">
            <div class="target" id="targetArea"></div>
            <div id="marker" class="marker"></div>
        </div>

        <button onclick="hitShot()">HIT!</button>
        <div id="commentary" class="commentary">Waiting for delivery...</div>
    `;

    // Make target bigger if player has Pro Bat
    if (player.gear === "Pro Willow") {
        document.getElementById("targetArea").style.width = "60px";
    }

    markerPos = 0;
    speed = 2 + (Math.random() * 4) + (player.level * 0.1);

    clearInterval(interval);
    interval = setInterval(moveMarker, 20);
}

function moveMarker() {
    markerPos += speed;
    if (markerPos > 100) markerPos = 0;
    let m = document.getElementById("marker");
    if(m) m.style.left = markerPos + "%";
}

function hitShot() {
    clearInterval(interval);
    let targetCenter = 46;
    let diff = Math.abs(markerPos - targetCenter);
    let outcome;

    if (diff < (player.gear === "Pro Willow" ? 10 : 6)) outcome = "perfect";
    else if (diff < 18) outcome = "good";
    else outcome = "bad";

    processOutcome(outcome);
}

function processOutcome(type) {
    match.balls++;
    player.ballsFaced++;
    player.stamina -= 0.5; // Every ball drains stamina
    let text = "";
    let runsAdded = 0;

    if (type === "perfect") {
        runsAdded = 6;
        text = "SHOT! That's gone into the top tier of the stadium!";
    } else if (type === "good") {
        runsAdded = Math.floor(Math.random() * 4) + 1;
        text = `Well played for ${runsAdded}. Finding the gaps.`;
    } else {
        if (Math.random() < 0.35) {
            match.wickets++; player.outs++;
            text = "OUT! Finger goes up! He's gutted.";
        } else {
            text = "Swing and a miss! Beaten by the pace.";
        }
    }

    match.runs += runsAdded;
    player.runs += runsAdded;
    
    document.getElementById("commentary").innerText = text;
    updateTopBar();
    setTimeout(nextBall, 1200);
}

function endMatch() {
    player.matches++;
    let earnings = match.runs * 2; // Earn money per run
    player.money += earnings;
    player.xp += match.runs;
    
    if (player.xp > player.level * 100) { 
        player.level++; 
        player.batting += 5; 
    }

    document.getElementById("game").innerHTML = `
        <h2>Innings Complete</h2>
        <p>You scored ${match.runs} runs.</p>
        <p>Match Earnings: ₹${earnings}</p>
        <button onclick="playMatch()">Next Match</button>
    `;
    updateTopBar();
}

// ---------------- RETAINED PREVIOUS SYSTEMS ----------------
function showStats() {
    document.getElementById("game").innerHTML = `
        <h2>Player Profile</h2>
        <p>Avg: ${player.average} | SR: ${player.strikeRate}</p>
        <p>Total Runs: ${player.runs} | Matches: ${player.matches}</p>
    `;
}

function showSelection() {
    let avg = parseFloat(player.average);
    let status = "Local Club";
    if (avg > 50) status = "India 🇮🇳";
    else if (avg > 35) status = "Franchise League";
    player.team = status;
    document.getElementById("game").innerHTML = `<h2>Selection</h2><h3>Grade: ${status}</h3>`;
}

function startAuction() {
    let teams = ["Chennai", "Mumbai", "Bangalore"];
    let html = "<h2>Mega Auction</h2>";
    let highBid = 0;
    teams.forEach(t => {
        let bid = Math.floor(Math.random() * 5000) + (player.runs * 5);
        if(bid > highBid) { highBid = bid; player.team = t; }
        html += `<div class="card">${t}<br>₹${bid}</div>`;
    });
    player.money += Math.floor(highBid/10); // Player gets a signing bonus
    html += `<h3>Contract Signed with ${player.team}!</h3>`;
    document.getElementById("game").innerHTML = html;
    updateTopBar();
}

function startTournament() {
    let rain = Math.random() < 0.2;
    document.getElementById("game").innerHTML = rain ? "<h2>Rain! DLS in effect. Target reduced.</h2>" : "<h2>Tournament Match Started!</h2>";
    // Simulate table
    let table = "<table><tr><th>Team</th><th>Pts</th></tr><tr><td>${player.team}</td><td>12</td></tr><tr><td>Opponent</td><td>10</td></tr></table>";
    document.getElementById("game").innerHTML += table;
}

</script>
</body>
</html>
