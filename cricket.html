<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Career 26 | Pro Manager</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0e14; --card: #141b26; --text: #e0e6ed; --accent: #00ff88; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* Top Navigation Bar */
        .status-bar { display: flex; justify-content: space-around; background: #000; padding: 10px; border-bottom: 2px solid var(--primary); font-size: 12px; font-weight: bold; }
        .currency { color: #ffd700; }

        /* Coach Favorability & Goals (Inspired by Screenshot 1) */
        .management-section { padding: 15px; background: var(--card); margin: 10px; border-radius: 12px; border: 1px solid #2d3748; }
        .favor-bar { height: 8px; background: #222; border-radius: 4px; margin-top: 5px; position: relative; }
        .favor-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #ff4d4d, var(--accent)); transition: 1s; }
        
        /* Tournament Bracket (Inspired by Screenshot 1) */
        .bracket-container { padding: 15px; overflow-x: auto; }
        .match-up { background: #1a222f; padding: 10px; border-radius: 6px; margin: 5px 0; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; font-size: 11px; }

        /* Stats & Evaluation */
        .eval-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .eval-card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #2d3748; }
        .eval-card h3 { margin: 0; font-size: 10px; color: #718096; }
        .eval-card p { margin: 5px 0 0; font-size: 18px; font-weight: bold; color: var(--primary); }

        /* Match Simulation (Inspired by Screenshot 3) */
        #matchSim { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; padding: 20px; text-align: center; }
        .field-view { width: 100%; height: 250px; background: #2d5a27; border-radius: 20px; margin: 20px 0; border: 5px solid #fff; position: relative; overflow: hidden; }
        .wicket { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: #fff; font-weight: bold; }

        button { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: 800; width: 90%; margin: 10px 5%; cursor: pointer; }
        .goal-item { font-size: 12px; color: #a0aec0; padding: 5px 0; border-bottom: 1px solid #2d3748; }
    </style>
</head>
<body>

    <div class="status-bar">
        <span>LVL: <span id="lvl">1</span></span>
        <span class="currency">💎 <span id="gems">990</span></span>
        <span>AURA: <span id="aura">100</span></span>
    </div>

    <div class="management-section">
        <div style="display:flex; justify-content: space-between; font-size: 12px;">
            <span>Coach's Favorability</span>
            <span id="favorText">75%</span>
        </div>
        <div class="favor-bar"><div id="favorFill" class="favor-fill" style="width: 75%;"></div></div>
        
        <div style="margin-top: 15px;">
            <div class="label" style="font-size: 10px; color: #718096;">SEASON GOALS</div>
            <div class="goal-item">✔ Reach 500 Career Runs</div>
            <div class="goal-item" id="goalMatch">○ Win the District Quarter-Final</div>
        </div>
    </div>

    <div class="eval-grid">
        <div class="eval-card"><h3>TOTAL RUNS</h3><p id="runs">0</p></div>
        <div class="eval-card"><h3>AVG</h3><p id="avg">0.0</p></div>
    </div>

    <div class="bracket-container">
        <div class="label" style="font-size: 10px; color: #718096; margin-bottom: 10px;">TOURNAMENT BRACKET</div>
        <div class="match-up"><span>YOU vs Lions XI</span><span style="color:var(--accent)">LIVE</span></div>
        <div class="match-up" style="opacity: 0.5;"><span>Strikers vs Titans</span><span>TBD</span></div>
    </div>

    <button onclick="startProMatch()">GO TO NEXT MATCH</button>

    <div id="matchSim">
        <h2 id="mTitle">Quarter-Finals</h2>
        <div class="field-view">
            <div class="wicket">WICKET</div>
            <div id="ballAnim" style="position:absolute; width:10px; height:10px; background:red; border-radius:50%; display:none;"></div>
        </div>
        <div style="font-size: 32px; font-weight: 900;" id="mScore">0</div>
        <p id="mLog" style="color:#718096">Ready to Bat...</p>
        <div id="mControls">
            <button onclick="playBall(2)">Defensive</button>
            <button onclick="playBall(5)" style="background:var(--accent)">Aggressive</button>
        </div>
        <button id="exitSim" style="display:none;" onclick="closeSim()">BACK TO CLUB</button>
    </div>

    <script>
        let career = {
            runs: 0, matches: 0, favor: 75, gems: 990, aura: 100, stage: 1
        };

        function startProMatch() {
            document.getElementById('matchSim').style.display = 'block';
            document.getElementById('mScore').innerText = "0";
            document.getElementById('mControls').style.display = 'block';
            document.getElementById('exitSim').style.display = 'none';
        }

        function playBall(risk) {
            let mScore = parseInt(document.getElementById('mScore').innerText);
            let chance = Math.random() * 10;
            
            if(chance < risk) {
                document.getElementById('mLog').innerText = "OUT! Caught at deep mid-wicket.";
                endSim(mScore);
            } else {
                let runs = Math.floor(Math.random() * risk) + 1;
                mScore += runs;
                document.getElementById('mScore').innerText = mScore;
                document.getElementById('mLog').innerText = runs + " Runs scored!";
            }
        }

        function endSim(score) {
            career.runs += score;
            career.matches++;
            career.favor = Math.min(100, career.favor + (score > 20 ? 5 : -5));
            
            document.getElementById('mControls').style.display = 'none';
            document.getElementById('exitSim').style.display = 'block';
            updateUI();
        }

        function updateUI() {
            document.getElementById('runs').innerText = career.runs;
            document.getElementById('avg').innerText = (career.runs / career.matches).toFixed(1);
            document.getElementById('favorFill').style.width = career.favor + "%";
            document.getElementById('favorText').innerText = career.favor + "%";
        }

        function closeSim() { document.getElementById('matchSim').style.display = 'none'; }
    </script>
</body>
</html>
