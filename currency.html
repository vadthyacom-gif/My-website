<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pro Suite</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text);
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            width: 380px;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 12px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            font-weight: 600;
            border-radius: 8px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .content { display: none; }
        .content.active { display: block; }

        /* Shared Components */
        input, select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        /* Calculator Styles */
        .calc-display {
            text-align: right;
            margin-bottom: 20px;
        }
        #calc-history { font-size: 0.8rem; color: var(--accent); min-height: 20px; }
        #calc-main { font-size: 2.5rem; margin: 5px 0; font-weight: 300; overflow: hidden; }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .grid button {
            height: 60px;
            border-radius: 15px;
            border: none;
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .grid button:hover { background: rgba(255,255,255,0.15); }
        .grid .op { color: var(--accent); }
        .grid .equal { background: var(--primary); grid-column: span 2; }

        /* Converter Styles */
        .converter-ui { display: flex; flex-direction: column; gap: 15px; }
        .row { display: flex; align-items: center; gap: 10px; }
        .swap-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 1.5rem; }
        #conv-result {
            margin-top: 15px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('calc')">Calculator</button>
        <button class="tab-btn" onclick="openTab('conv')">Currency</button>
    </div>

    <div id="calc" class="content active">
        <div class="calc-display">
            <div id="calc-history"></div>
            <div id="calc-main">0</div>
        </div>
        <div class="grid">
            <button class="op" onclick="clearCalc()">AC</button>
            <button class="op" onclick="pressCalc('**')">^</button>
            <button class="op" onclick="pressCalc('%')">%</button>
            <button class="op" onclick="pressCalc('/')">÷</button>
            
            <button onclick="pressCalc('7')">7</button>
            <button onclick="pressCalc('8')">8</button>
            <button onclick="pressCalc('9')">9</button>
            <button class="op" onclick="pressCalc('*')">×</button>
            
            <button onclick="pressCalc('4')">4</button>
            <button onclick="pressCalc('5')">5</button>
            <button onclick="pressCalc('6')">6</button>
            <button class="op" onclick="pressCalc('-')">−</button>
            
            <button onclick="pressCalc('1')">1</button>
            <button onclick="pressCalc('2')">2</button>
            <button onclick="pressCalc('3')">3</button>
            <button class="op" onclick="pressCalc('+')">+</button>
            
            <button onclick="pressCalc('0')">0</button>
            <button onclick="pressCalc('.')">.</button>
            <button class="equal" onclick="calculateResult()">=</button>
        </div>
    </div>

    <div id="conv" class="content">
        <div class="converter-ui">
            <input type="number" id="amount" value="1" placeholder="Amount">
            
            <div class="row">
                <select id="fromCur">
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="INR" selected>INR</option>
                    <option value="GBP">GBP</option>
                </select>
                <button class="swap-btn" onclick="swapCur()">⇄</button>
                <select id="toCur">
                    <option value="USD" selected>USD</option>
                    <option value="EUR">EUR</option>
                    <option value="INR">INR</option>
                    <option value="GBP">GBP</option>
                </select>
            </div>

            <button class="equal" style="width:100%; height: 50px; border-radius:12px; border:none; color:white; cursor:pointer;" onclick="convertCur()">Get Live Rate</button>
            
            <div id="conv-result">
                <div id="res-val" style="font-size: 1.8rem; font-weight: 700; color: var(--accent);">--</div>
                <div id="res-rate" style="font-size: 0.8rem; opacity: 0.6; margin-top: 5px;">Enter amount and convert</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Tab Logic
    function openTab(tabId) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- Calculator Logic ---
    let calcExpression = "";
    const mainDisp = document.getElementById('calc-main');
    const histDisp = document.getElementById('calc-history');

    function pressCalc(val) {
        if (calcExpression === "" && isNaN(val) && val !== '.') return;
        calcExpression += val;
        mainDisp.innerText = calcExpression;
    }

    function clearCalc() {
        calcExpression = "";
        mainDisp.innerText = "0";
        histDisp.innerText = "";
    }

    function calculateResult() {
        try {
            const result = new Function('return ' + calcExpression)();
            histDisp.innerText = calcExpression + " =";
            calcExpression = result.toString();
            mainDisp.innerText = Number.isInteger(result) ? result : result.toFixed(4);
        } catch {
            mainDisp.innerText = "Error";
            setTimeout(clearCalc, 1000);
        }
    }

    // --- Currency Logic ---
    async function convertCur() {
        const amt = document.getElementById('amount').value;
        const from = document.getElementById('fromCur').value;
        const to = document.getElementById('toCur').value;
        const resVal = document.getElementById('res-val');
        const resRate = document.getElementById('res-rate');

        resVal.innerText = "Updating...";

        try {
            // Using a public free API (No key needed for this specific endpoint usually)
            const response = await fetch(`https://open.er-api.com/v6/latest/${from}`);
            const data = await response.json();
            const rate = data.rates[to];
            const total = (amt * rate).toFixed(2);

            resVal.innerText = `${total} ${to}`;
            resRate.innerText = `1 ${from} = ${rate.toFixed(4)} ${to}`;
        } catch (e) {
            resVal.innerText = "Offline";
            resRate.innerText = "Failed to fetch live data";
        }
    }

    function swapCur() {
        const from = document.getElementById('fromCur');
        const to = document.getElementById('toCur');
        [from.value, to.value] = [to.value, from.value];
    }
</script>

</body>
</html>
