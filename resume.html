<!DOCTYPE html>
<html>
<head>
  <title>Resume Builder</title>

  <style>
    body {
      font-family: Arial;
      background: #f0f0f0;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .form-box, .resume-box {
      background: white;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 10px;
    }

    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .resume-box {
      text-align: left;
    }

    h2 {
      border-bottom: 2px solid black;
      padding-bottom: 5px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="form-box">
    <h1>📄 Resume Builder</h1>

    <input type="text" id="name" placeholder="Your Name"><br>
    <input type="text" id="email" placeholder="Your Email"><br>
    <input type="text" id="phone" placeholder="Your Phone"><br>

    <textarea id="skills" placeholder="Your Skills"></
