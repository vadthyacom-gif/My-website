<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Resume Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-header: #262626;
            --text-gray: #4a4a4a;
            --line-color: #e5e5e5;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background: #f0f2f5;
        }

        /* --- EDITOR SIDEBAR --- */
        .editor {
            width: 450px;
            background: white;
            height: 100%;
            overflow-y: auto;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .editor h2 { font-size: 20px; margin-bottom: 20px; color: var(--dark-header); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .edit-group { margin-bottom: 20px; border-bottom: 1px solid #f1f1f1; padding-bottom: 10px; }
        label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #6366f1; margin-bottom: 8px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; box-sizing: border-box; font-size: 13px; }
        
        .btn-download { width: 100%; padding: 15px; background: var(--dark-header); color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; margin-top: 10px; }

        /* --- PREVIEW AREA --- */
        .preview {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
        }

        .resume-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            display: flex;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* The Vertical Timeline Axis */
        .resume-page::before {
            content: "";
            position: absolute;
            left: 38.5%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--line-color);
        }

        .left-col { width: 38.5%; padding: 40px 30px; box-sizing: border-box; z-index: 2; }
        .right-col { width: 61.5%; padding: 40px 40px; box-sizing: border-box; z-index: 2; }

        /* HEADER PILLS */
        .header-pills {
            background: var(--dark-header);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 25px 0 15px;
            text-transform: capitalize;
        }

        /* SQUARE PHOTO */
        .photo-box {
            width: 170px;
            height: 190px;
            background: #eee;
            border: 8px solid #f8f8f8;
            margin-bottom: 30px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }

        .name-main { font-size: 36px; font-weight: 800; text-transform: uppercase; margin: 0; color: #111; letter-spacing: 1px; }
        .role-sub { font-size: 18px; font-style: italic; color: #444; margin: 10px 0 30px; }

        .contact-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 13px; color: var(--text-gray); }
        
        /* SKILL DOTS */
        .skill-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 14px; font-weight: 600; }
        .dots { display: flex; gap: 4px; }
        .dot { width: 9px; height: 9px; border-radius: 50%; background: #e0e0e0; }
        .dot.active { background: #888; }

        /* TIMELINE ENTRIES */
        .timeline-entry { position: relative; padding-left: 20px; margin-bottom: 20px; }
        .timeline-entry::after {
            content: "";
            position: absolute;
            left: -28px; 
            top: 6px;
            width: 10px;
            height: 10px;
            background: var(--dark-header);
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 0 1px #d1d1d1;
        }
        .entry-title { font-weight: 800; font-size: 15px; color: #111; }
        .entry-subtitle { font-size: 13px; color: #666; font-style: italic; margin-top: 3px; }

        @media print {
            .editor { display: none; }
            .preview { padding: 0; background: white; }
            .resume-page { box-shadow: none; width: 100%; }
        }
    </style>
</head>
<body>

<div class="editor">
    <h2>Nxt Level Designer</h2>
    
    <div class="edit-group">
        <label>Square Photo</label>
        <input type="file" accept="image/*" onchange="updatePhoto(event)">
    </div>

    <div class="edit-group">
        <label>Identity</label>
        <input type="text" id="iName" value="NAWAB ALI" oninput="sync()" placeholder="Name">
        <input type="text" id="iRole" value="On the Job Trainee" oninput="sync()" placeholder="Role">
    </div>

    <div class="edit-group">
        <label>Objective</label>
        <textarea id="iObj" rows="3" oninput="sync()">To obtain a position offering a degree of challenge, an opportunity to learn and a chance to grow within a company...</textarea>
    </div>

    <div class="edit-group">
        <label>Contact (Address | Phone | Email | Social)</label>
        <textarea id="iContact" rows="3" oninput="sync()">Hyderabad, India | +91 0000000000 | ali@example.com | @nawab_ali</textarea>
    </div>

    <div class="edit-group">
        <label>Skills (Name:Rating 1-5)</label>
        <textarea id="iSkills" rows="3" oninput="sync()">Adaptability:5&#10;Flexibility:4&#10;Creativity:3</textarea>
    </div>

    <div class="edit-group">
        <label>Education (School | Degree | Year)</label>
        <textarea id="iEdu" rows="4" oninput="sync()">Taguig City University | BS Hospitality | (Present)&#10;Signal Village National | TVL Home Economics | (2019-2021)</textarea>
    </div>

    <div class="edit-group">
        <label>Achievements (Award | Details)</label>
        <textarea id="iAch" rows="3" oninput="sync()">Academic Achiever | Signal Village High (2015-2019)&#10;Dean's Lister | Taguig City University (2021-2024)</textarea>
    </div>

    <div class="edit-group">
        <label>Work Experience (Role | Co. | Year)</label>
        <textarea id="iWork" rows="3" oninput="sync()">FOH/BOH Internship | Italiannis Restaurant | 2023</textarea>
    </div>

    <div class="edit-group">
        <label>Reference (Name | Position | Contact)</label>
        <textarea id="iRef" rows="3" oninput="sync()">SAIREL IBAÑEZ | General Manager | 09260656748</textarea>
    </div>

    <button class="btn-download" onclick="window.print()">Download & Print PRO</button>
</div>

<div class="preview">
    <div class="resume-page">
        <div class="left-col">
            <div class="photo-box"><img id="resImg" src="https://via.placeholder.com/170x190"></div>
            
            <h1 class="name-main" id="resName">NAWAB ALI</h1>
            <p class="role-sub" id="resRole">On the Job Trainee</p>

            <div class="header-pills">Contact</div>
            <div id="resContact"></div>

            <div class="header-pills">Skills</div>
            <div id="resSkills"></div>
        </div>

        <div class="right-col">
            <p style="font-size: 14px; line-height: 1.6; color: var(--text-gray); margin-bottom: 30px;" id="resObj"></p>

            <div class="header-pills">Education</div>
            <div id="resEdu"></div>

            <div class="header-pills">Achievements</div>
            <div id="resAch"></div>

            <div class="header-pills">Work Experience</div>
            <div id="resWork"></div>

            <div class="header-pills">Reference</div>
            <div id="resRef"></div>
        </div>
    </div>
</div>

<script>
    function updatePhoto(e) {
        const r = new FileReader();
        r.onload = () => document.getElementById('resImg').src = r.result;
        r.readAsDataURL(e.target.files[0]);
    }

    function sync() {
        document.getElementById('resName').innerText = document.getElementById('iName').value;
        document.getElementById('resRole').innerText = document.getElementById('iRole').value;
        document.getElementById('resObj').innerText = document.getElementById('iObj').value;

        // Dynamic Lists Utility
        const parseList = (id, targetId) => {
            const lines = document.getElementById(id).value.split('\n');
            let html = '';
            lines.forEach(l => {
                const p = l.split('|');
                if(p.length >= 2) {
                    html += `<div class="timeline-entry">
                        <div class="entry-title">${p[0].trim()}</div>
                        <div class="entry-subtitle">${p[1].trim()} ${p[2] ? `| ${p[2].trim()}` : ''}</div>
                    </div>`;
                }
            });
            document.getElementById(targetId).innerHTML = html;
        };

        // Sync Contact
        const cParts = document.getElementById('iContact').value.split('|');
        let cHTML = '';
        cParts.forEach(p => { if(p) cHTML += `<div class="contact-item"> ${p.trim()}</div>`; });
        document.getElementById('resContact').innerHTML = cHTML;

        // Sync Lists
        parseList('iEdu', 'resEdu');
        parseList('iAch', 'resAch');
        parseList('iWork', 'resWork');
        parseList('iRef', 'resRef');

        // Sync Skills
        const skillLines = document.getElementById('iSkills').value.split('\n');
        let skillHTML = '';
        skillLines.forEach(l => {
            const p = l.split(':');
            if(p.length === 2) {
                let r = parseInt(p[1]);
                let dots = '';
                for(let i=1; i<=5; i++) dots += `<div class="dot ${i<=r?'active':''}"></div>`;
                skillHTML += `<div class="skill-row"><span>${p[0].trim()}</span><div class="dots">${dots}</div></div>`;
            }
        });
        document.getElementById('resSkills').innerHTML = skillHTML;
    }

    window.onload = sync;
</script>

</body>
</html>
